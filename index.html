        // Compute priority for a given FIN based on last service date
        function computeFinPriority(fin) {
            const entry = finTable[fin];
            if (!entry || !entry.lastSeen) return 1; // never serviced = P1
            const today = new Date(); today.setHours(0,0,0,0);
            const parts = entry.lastSeen.split('/');
            let lastDate;
            if (parts.length === 3) {
                const yr2 = parts[2].length === 2 ? 2000 + parseInt(parts[2]) : parseInt(parts[2]);
                lastDate = new Date(yr2, parts[0]-1, parts[1]);
                if (isNaN(lastDate)) lastDate = new Date(yr2, parts[1]-1, parts[0]);
            } else { lastDate = new Date(entry.lastSeen); }
            if (isNaN(lastDate)) return 1;
            lastDate.setHours(0,0,0,0);
            const daysAgo = Math.round((today - lastDate) / 86400000);
            if (daysAgo <= 1)      return 3;
            else if (daysAgo <= 2) return 2;
            else                   return 1;
        }

        function renderPriorityList() {
            const container = document.getElementById('priority-list');
            container.innerHTML = '';

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            // All known FINs: union of finTable (serviced) + aircraftRef (all known aircraft)
            const allFins = new Set([...Object.keys(finTable), ...Object.keys(aircraftRef)]);

            const rows = [...allFins].map(fin => {
                const entry  = finTable[fin];
                const refMatch = aircraftRef[fin.substring(0,5)] || aircraftRef[fin.substring(0,4)] || aircraftRef[fin];
                const type   = (entry && entry.type) || (refMatch && refMatch.type) || '—';
                const body   = (entry && entry.body) || (refMatch && refMatch.body) || '—';
                const airline = fin.substring(0,2);

                let lastSeen = null, daysAgo = null, priority;
                if (entry && entry.lastSeen) {
                    const parts = entry.lastSeen.split('/');
                    let lastDate;
                    if (parts.length === 3) {
                        const yr3 = parts[2].length === 2 ? 2000 + parseInt(parts[2]) : parseInt(parts[2]);
                        lastDate = new Date(yr3, parts[0]-1, parts[1]);
                        if (isNaN(lastDate)) lastDate = new Date(yr3, parts[1]-1, parts[0]);
                    } else { lastDate = new Date(entry.lastSeen); }
                    if (!isNaN(lastDate)) {
                        lastDate.setHours(0,0,0,0);
                        daysAgo  = Math.round((today - lastDate) / 86400000);
                        lastSeen = entry.lastSeen;
                    }
                }
                if (daysAgo === null)     priority = 1;
                else if (daysAgo <= 1)   priority = 3;
                else if (daysAgo <= 2)   priority = 2;
                else                     priority = 1;

                return { fin, type, body, airline, lastSeen, daysAgo, priority };
            });

            // Apply filters
            const pfFin = (document.getElementById('pf-fin')?.value || '').trim().toUpperCase();
            const filtered = rows.filter(r => {
                if (priorityFilterAirline  !== 'ALL' && r.airline  !== priorityFilterAirline)          return false;
                if (priorityFilterPriority !== 'ALL' && String(r.priority) !== priorityFilterPriority) return false;
                if (pfFin && !r.fin.includes(pfFin))                                                   return false;
                return true;
            });

            if (filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-16 bg-white rounded-2xl border-2 border-dashed border-slate-200 text-slate-400 font-bold">No aircraft match filter</div>`;
                return;
            }

            // Sort: priority asc (1 first), then airline alpha, then FIN numeric
            filtered.sort((a, b) =>
                a.priority - b.priority ||
                a.airline.localeCompare(b.airline) ||
                parseInt(a.fin.replace(/\D/g,'')) - parseInt(b.fin.replace(/\D/g,''))
            );

            // Group by priority
            const groups = { 1: [], 2: [], 3: [] };
            filtered.forEach(r => groups[r.priority].push(r));

            const priorityMeta = {
                1: { label: 'Priority 1 — Overdue (3+ days)', bg: 'bg-red-50', border: 'border-red-200', headColor: 'text-red-600', badge: 'bg-red-100 text-red-700 border-red-200' },
                2: { label: 'Priority 2 — 2 Days Ago',          bg: 'bg-amber-50', border: 'border-amber-200', headColor: 'text-amber-600', badge: 'bg-amber-100 text-amber-700 border-amber-200' },
                3: { label: 'Priority 3 — Recent (0–1 Day)', bg: 'bg-emerald-50', border: 'border-emerald-200', headColor: 'text-emerald-600', badge: 'bg-emerald-100 text-emerald-700 border-emerald-200' },
            };

            [1, 2, 3].forEach(p => {
                if (groups[p].length === 0) return;
                const meta = priorityMeta[p];

                const section = document.createElement('div');
                section.className = `bg-white rounded-2xl border ${meta.border} shadow-sm overflow-hidden mb-3`;

                const groupHead = document.createElement('div');
                groupHead.className = `${meta.bg} px-4 py-2 border-b ${meta.border} flex items-center justify-between`;
                groupHead.innerHTML = `
                    <span class="text-[10px] font-black uppercase tracking-widest ${meta.headColor}">${meta.label}</span>
                    <span class="text-[10px] font-black px-2 py-0.5 rounded-full border ${meta.badge}">${groups[p].length}</span>`;
                section.appendChild(groupHead);

                const colHead = document.createElement('div');
                colHead.className = "grid gap-2 px-4 py-1.5 text-[9px] font-black uppercase tracking-widest text-slate-400 border-b border-slate-100";
                colHead.style.gridTemplateColumns = "4rem 4.5rem 2.5rem 1fr 2rem";
                colHead.innerHTML = `<span>FIN</span><span>Type</span><span>Body</span><span>Last Serviced</span><span class="text-center">P</span>`;
                section.appendChild(colHead);

                groups[p].forEach(r => {
                    const bodyColor  = r.body === 'WB' ? 'text-purple-600' : 'text-slate-400';
                    const daysLabel  = r.daysAgo === null ? 'Never' : r.daysAgo === 0 ? 'Today' : r.daysAgo === 1 ? 'Yesterday' : `${r.daysAgo}d ago`;
                    const dateStr    = r.lastSeen || '—';
                    const pColor     = p === 1 ? 'text-red-500' : p === 2 ? 'text-amber-500' : 'text-emerald-500';
                    const row = document.createElement('div');
                    row.className = "grid gap-2 px-4 py-2.5 text-[11px] border-b border-slate-50 hover:bg-slate-50 items-center last:border-0";
                    row.style.gridTemplateColumns = "4rem 4.5rem 2.5rem 1fr 2rem";
                    row.innerHTML = `
                        <span class="font-mono font-black text-blue-600">${r.fin}</span>
                        <span class="font-bold text-slate-700">${r.type}</span>
                        <span class="font-black text-[10px] ${bodyColor}">${r.body}</span>
                        <span class="text-slate-500">${dateStr} <span class="text-slate-300 text-[9px]">(${daysLabel})</span></span>
                        <span class="text-center font-black text-[13px] ${pColor}">${p}</span>`;
                    section.appendChild(row);
                });

                container.appendChild(section);
            });
        }

        function handleSave(event) {
            event.preventDefault();
            const form = event.target;
            const formData = new FormData(form);
            const entry = Object.fromEntries(formData.entries());
            const now = new Date();
            const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
            const isInvMode = isInventoryOnlyMode || (entry.FIN && entry.FIN.toUpperCase() === "INV");

            if (!entry.Agent || entry.Agent.trim() === "") {
                showToast("Please select your Agent name!");
                document.getElementById('agent-field').focus();
                return;
            }

            entry.Rv = CURRENT_VERSION;

            // Auto-format Flight#: prepend first 2 chars of FIN + zero-pad to 4 digits
            if (!isInventoryOnlyMode && entry['Flight#'] && entry.FIN) {
                const prefix = entry.FIN.substring(0, 2).toUpperCase();
                const digits = entry['Flight#'].replace(/\D/g, '').padStart(4, '0');
                entry['Flight#'] = prefix + digits;
            }

            let invalidAssetsFound = [];
            const assetFieldsToCheck = ['HHD1', 'HHD2', 'HHD3', 'HHD4', 'HD1Rmvd', 'HD2Rmvd', 'HD3Rmvd', 'HD4Rmvd', 'ASST'];
            assetFieldsToCheck.forEach(field => {
                const val = entry[field];
                if (val && !isValidAssetId(val)) invalidAssetsFound.push(val);
            });

            if (!isInvMode) {
                const bodyType = getBodyType(entry.FIN);
                const isQK = entry.FIN.toUpperCase().startsWith("QK");
                let missingDetected = false;
                if (!entry.Case1 || entry.Case1.trim() === "") { entry.Case1 = "Msng"; missingDetected = true; }
                else entry.Case1 = formatCaseId(entry.Case1);
                if (!entry.HHD1 || entry.HHD1.trim() === "") { entry.HHD1 = "Msng"; missingDetected = true; }
                else entry.HHD1 = formatGGCId(entry.HHD1);
                if (!entry.HHD2 || entry.HHD2.trim() === "") {
                    if (isQK) { entry.HHD2 = "NtRqrd"; }
                    else { entry.HHD2 = "Msng"; missingDetected = true; }
                } else entry.HHD2 = formatGGCId(entry.HHD2);
                if (!entry.Case2 || entry.Case2.trim() === "") {
                    if (bodyType === "NB") { entry.Case2 = "NtRqrd"; }
                    else { entry.Case2 = "Msng"; missingDetected = true; }
                } else entry.Case2 = formatCaseId(entry.Case2);
                if (!entry.HHD3 || entry.HHD3.trim() === "") {
                    if (bodyType === "NB") { entry.HHD3 = "NtRqrd"; }
                    else { entry.HHD3 = "Msng"; missingDetected = true; }
                } else entry.HHD3 = formatGGCId(entry.HHD3);
                if (!entry.HHD4 || entry.HHD4.trim() === "") {
                    if (bodyType === "NB") { entry.HHD4 = "NtRqrd"; }
                    else { entry.HHD4 = "Msng"; missingDetected = true; }
                } else entry.HHD4 = formatGGCId(entry.HHD4);
                if (missingDetected && (!entry.SrvcIssCAT || entry.SrvcIssCAT === "")) {
                    entry.SrvcIssCAT = "Missing"; entry.SrvcIss = "HHD From Aircraft";
                }
                ['HD1Rmvd', 'HD2Rmvd', 'HD3Rmvd', 'HD4Rmvd'].forEach(f => entry[f] = formatGGCId(entry[f], true));
            } else {
                entry.FIN = "INV"; entry['Flight#'] = ""; entry.Serviced = "Yes"; 
                entry.Case1 = "N/A"; entry.Case2 = "N/A"; entry.Case3 = "N/A";
                entry.HHD1 = "N/A"; entry.HHD2 = "N/A"; entry.HHD3 = "N/A";
                entry.HHD4 = "N/A"; entry.HHD5 = "N/A"; entry.HHD6 = "N/A";
            }

            if (entry.ASST) entry.ASST = formatGGCId(entry.ASST);
            if (!entry.SrvcIssCAT || entry.SrvcIssCAT.trim() === "") entry.SrvcIssCAT = "---";
            if (!entry.SrvcIss || entry.SrvcIss.trim() === "") entry.SrvcIss = "---";
            
            entry.id = Date.now() + Math.floor(Math.random() * 1000);
            entry.displayDate = now.toLocaleDateString();
            entry.displayTime = timeStr;

            const buildComments = (rec) => {
                let parts = [];
                if (isInvMode) parts.push("[INV]");
                if (form.elements['ServiceCall']?.checked) parts.push("Service Call");
                if (rec.ASST) {
                    const rawId = rec.ASST.replace(/\D/g, '');
                    const assetType = assetRef[rawId] || assetRef[rawId.padStart(4, '0')];
                    if (assetType) parts.push(`Type: ${assetType}`);
                }
                if (rec.SrvcIssCAT !== "---") parts.push(`${rec.SrvcIssCAT}: ${rec.SrvcIss}`);
                if (rec.IssueDetails) parts.push(`Iss: ${rec.IssueDetails}`);
                if (rec.GeneralComments) parts.push(rec.GeneralComments);
                if (invalidAssetsFound.length > 0) {
                    invalidAssetsFound.forEach(val => {
                        const digits = val.replace(/\D/g, '').padStart(4, '0');
                        parts.push(`GGC${digits} Doesn't Exist`);
                    });
                }
                return parts.join(" | ");
            };

            entry.Comments = buildComments(entry);
            db.unshift(entry);
            addToSharedDb(entry);
            broadcastNewEntry(entry);
            updateFinTable(entry);

            if (!isInvMode) {
                const removals = [{f: 'HD1Rmvd', p: 'HHD1'}, {f: 'HD2Rmvd', p: 'HHD2'}, {f: 'HD3Rmvd', p: 'HHD3'}, {f: 'HD4Rmvd', p: 'HHD4'}];
                removals.forEach((r, idx) => {
                    const removedId = entry[r.f];
                    const boardedId = entry[r.p];
                    if (removedId && removedId.trim() !== "" && !removedId.toLowerCase().includes("ntrqrd") && !removedId.toLowerCase().includes("n/a")) {
                        db.unshift({
                            id: Date.now() + Math.floor(Math.random() * 1000) + (idx + 1), FIN: "INV", 'Flight#': entry['Flight#'] || "", displayDate: entry.displayDate, displayTime: timeStr,
                            Priority: "1", Serviced: "Yes", Case1: "N/A", Case2: "N/A", Case3: "N/A", HHD1: "N/A", HHD2: "N/A",
                            HHD3: "N/A", HHD4: "N/A", HHD5: "N/A", HHD6: "N/A", Battery: "", Rolls: "", ASST: removedId,
                            SrvcIssCAT: "RM ( INV REM Base )", SrvcIss: "For Use In Service",
                            'Service Station': entry['Service Station'], Agent: entry.Agent, Rv: CURRENT_VERSION,
                            Comments: `${removedId} Swp Wth ${boardedId} On Fin ${entry.FIN}${!isValidAssetId(removedId) ? ' | ' + removedId + ' Doesn\'t Exist' : ''}`
                        });
                    }
                });
            }

            try {
                localStorage.setItem(APP_STORAGE_KEY, JSON.stringify(db));
            } catch (e) {
                showToast("Save failed: storage full!");
                return;
            }
            updateUI();
            showToast("Record Saved!");
            form.reset();
            document.querySelectorAll('.asset-input').forEach(el => el.classList.remove('invalid-asset'));
            restoreAgent();
            document.getElementById('ref-type').textContent = "";
            document.getElementById('ref-body').textContent = "";
            document.getElementById('fin-rotation').innerHTML = "";
            document.getElementById('field-flight').placeholder = 'e.g. 0123';
            // Release claim for the FIN that was just saved
            const savedFin = document.getElementById('field-fin');
            if (savedFin && savedFin.value) releaseFin(savedFin.value);
            else if (updateFinPlaceholder._lastSuggested) releaseFin(updateFinPlaceholder._lastSuggested);
            updateFinPlaceholder._lastSuggested = null;
            updateFinPlaceholder();
            hideTypoHint(); // clears all hint boxes
            // Reset placeholders that may have been set by handleFinInput
            document.getElementById('field-case2').placeholder = "000 or Msng";
            document.getElementById('field-hhd2').placeholder  = "0000 or Msng";
            document.getElementById('field-hhd3').placeholder  = "0000 or Msng";
            document.getElementById('field-hhd4').placeholder  = "0000 or Msng";
            document.getElementById('field-battery').placeholder = "0";
            if (isInventoryOnlyMode) applyModeUI();
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function updateUI() {
            const list = document.getElementById('records-list');
            document.getElementById('count').innerText = db.length;
            if (db.length === 0) { list.innerHTML = ''; document.getElementById('no-records').classList.remove('hidden'); return; }
            document.getElementById('no-records').classList.add('hidden');

            const skip = new Set(['N/A', 'NtRqrd', 'Msng', '', undefined, null]);
            const fmtA = (...vals) => vals.filter(v => !skip.has(v)).join(', ') || '---';
            const fmtR = (...vals) => vals.filter(v => !skip.has(v)).join(', ');

            list.innerHTML = db.map(r => {
                const cases  = fmtA(r.Case1, r.Case2);

                        setTimeout(() => { if (p2pPeer && !p2pPeer.destroyed) p2pPeer.reconnect(); }, 4000);
                    });
                } else if (err.type === 'network' || err.type === 'server-error' || err.type === 'socket-error') {
                    setSyncStatus('offline');
                    setTimeout(() => {
                        if (p2pPeer && !p2pPeer.destroyed) p2pPeer.reconnect();
                    }, 5000);
                }
            });
        }

        function connectToAllPeers(myAgentValue) {
            const myPeerId = agentToPeerId(myAgentValue);
            ALL_AGENTS.forEach(name => {
                const theirId = `ggcsync-${name.toLowerCase().replace(/\s+/g, '-')}`;
                if (theirId === myPeerId) return;              // skip self
                if (p2pConnections[theirId]) return;           // already connected
                attemptConnect(theirId);
            });
        }

        function attemptConnect(theirId, retries = 0) {
            if (!p2pPeer || !p2pReady || p2pConnections[theirId]) return;
            const conn = p2pPeer.connect(theirId, { reliable: true });
            setupP2PConnection(conn);
        }

        function setupP2PConnection(conn) {
            // Register data/close/error handlers immediately regardless of open state
            conn.on('data', (msg) => handleP2PMessage(msg, conn.peer));

            conn.on('close', () => {
                delete p2pConnections[conn.peer];
                updateSyncCount();
                setTimeout(() => attemptConnect(conn.peer), 20000);
            });

            conn.on('error', () => {
                delete p2pConnections[conn.peer];
                updateSyncCount();
            });

            const doSync = () => {
                p2pConnections[conn.peer] = conn;
                updateSyncCount();
                const sinceTs = lastSyncTs[conn.peer] || 0;
                const delta = buildDelta(sinceTs);
                const msgType = sinceTs === 0 ? 'FULL_SYNC' : 'DELTA_SYNC';
                // Include active (non-expired) claims so the peer knows which FINs are taken
                const activeClaims = {};
                const now = Date.now();
                Object.entries(finClaims).forEach(([fin, c]) => {
                    if (now - c.ts <= CLAIM_TTL_MS) activeClaims[fin] = c;
                });
                conn.send({ type: msgType, sinceTs, ...delta, finClaims: activeClaims });
                flushP2PQueue();
            };

            // If already open (incoming connection), sync immediately
            // Otherwise wait for the open event (outgoing connection)
            if (conn.open) {
                doSync();
            } else {
                conn.on('open', doSync);
            }
        }

        function applyIncomingSyncMsg(msg, fromPeer) {
            let anyChanged = false;

            // Merge finTable
            if (msg.finTable && typeof msg.finTable === 'object') {
                let changed = false;
                Object.entries(msg.finTable).forEach(([fin, incoming]) => {
                    if (!finTable[fin]) {
                        finTable[fin] = { ...incoming };
                        changed = true;
                    } else if ((incoming._ts || 0) > (finTable[fin]._ts || 0)) {
                        finTable[fin].lastSeen      = incoming.lastSeen;
                        finTable[fin].lastFlight    = incoming.lastFlight;
                        finTable[fin].lastAgent     = incoming.lastAgent   || finTable[fin].lastAgent   || '';
                        finTable[fin].lastStation   = incoming.lastStation || finTable[fin].lastStation || '';
                        finTable[fin].lastOnboard   = incoming.lastOnboard;
                        finTable[fin].lastRemoved   = incoming.lastRemoved;
                        finTable[fin].type          = incoming.type || finTable[fin].type;
                        finTable[fin].body          = incoming.body || finTable[fin].body;
                        finTable[fin]._ts           = incoming._ts;
                        changed = true;
                    }
                });
                if (changed) { saveFinTable(); anyChanged = true; }
            }

            // Merge assetIndex
            if (msg.assetIndex && typeof msg.assetIndex === 'object') {
                let changed = false;
                Object.entries(msg.assetIndex).forEach(([assetId, incoming]) => {
                    const existing = assetIndex[assetId];
                    if (!existing || (incoming.ts || 0) > (existing.ts || 0)) {
                        assetIndex[assetId] = incoming;
                        changed = true;
                    }
                });
                if (changed) { saveAssetIndex(); anyChanged = true; }
            }

            // Merge nroIndex
            if (msg.nroIndex && typeof msg.nroIndex === 'object') {
                let changed = false;
                Object.entries(msg.nroIndex).forEach(([assetId, incoming]) => {
                    const inAsset = assetIndex[assetId];
                    if (inAsset && (inAsset.ts || 0) >= (incoming.ts || 0)) return;
                    const existing = nroIndex[assetId];
                    if (!existing || (incoming.ts || 0) > (existing.ts || 0)) {
                        nroIndex[assetId] = incoming;
                        changed = true;
                    }
                });
                Object.keys(nroIndex).forEach(assetId => {
                    const inAsset = assetIndex[assetId];
                    if (inAsset && (inAsset.ts || 0) >= (nroIndex[assetId].ts || 0)) {
                        delete nroIndex[assetId]; changed = true;
                    }
                });
                if (changed) { saveNroIndex(); anyChanged = true; }
            }

            // Merge scheduleData — full replace only if newer
            if (msg.scheduleData && typeof msg.scheduleData === 'object' && Object.keys(msg.scheduleData).length > 0) {
                const firstIncoming = Object.values(msg.scheduleData)[0];
                const incomingTs = Array.isArray(firstIncoming) ? (firstIncoming[0]?._ts || 0) : (firstIncoming?._ts || 0);
                const firstLocal  = Object.keys(scheduleData).length > 0 ? Object.values(scheduleData)[0] : null;
                const localTs     = firstLocal ? (Array.isArray(firstLocal) ? (firstLocal[0]?._ts || 0) : (firstLocal?._ts || 0)) : 0;
                if (incomingTs > localTs) {
                    scheduleData = msg.scheduleData;
                    saveScheduleData();
                    anyChanged = true;
                    showToast('↓ Schedule updated from peer');
                }
            }

            // Merge agentRef — per-agent last-write-wins with tombstone support
            if (msg.agentRef && Array.isArray(msg.agentRef)) {
                // Merge incoming tombstones first — keep the newest deletion timestamp
                if (msg.agentBlock && typeof msg.agentBlock === 'object') {
                    Object.entries(msg.agentBlock).forEach(([v, ts]) => {
                        if (!agentBlock[v] || ts > agentBlock[v]) agentBlock[v] = ts;
                    });
                    saveAgentBlock();
                }
                let agentChanged = false;
                msg.agentRef.forEach(incoming => {
                    const tombstoneTs = agentBlock[incoming.value] || 0;
                    // Reject if tombstone is newer than this agent record
                    if (tombstoneTs > (incoming._ts || 0)) return; // tombstone must be strictly newer
                    const existing = agentRef.find(a => a.value === incoming.value);
                    if (!existing) { agentRef.push(incoming); agentChanged = true; }
                    else if ((incoming._ts || 0) > (existing._ts || 0)) { Object.assign(existing, incoming); agentChanged = true; }
                });
                // Remove any agents whose tombstone is newer than their record
                const before = agentRef.length;
                agentRef = agentRef.filter(a => {
                    const tombTs = agentBlock[a.value] || 0;
                    return tombTs <= (a._ts || 0); // keep if tombstone is same age or older
                });
                if (agentRef.length !== before) agentChanged = true;
                if (agentChanged) {
                    agentRef.sort((a, b) => a.station.localeCompare(b.station) || a.displayName.localeCompare(b.displayName));
                    saveAgentRef();
                    rebuildAgentDropdown();
                    syncAllAgentsFromRef();
                    anyChanged = true;
                }
            }

            // Merge incoming finClaims (piggybacked on FULL_SYNC / DELTA_SYNC)
            if (msg.finClaims && typeof msg.finClaims === 'object') {
                let claimChanged = false;
                const now = Date.now();
                Object.entries(msg.finClaims).forEach(([fin, c]) => {
                    if (!c || !c.agent || !c.ts) return;
                    if (now - c.ts > CLAIM_TTL_MS) return; // already expired
                    const existing = finClaims[fin];
                    if (!existing || c.ts > existing.ts) {
                        finClaims[fin] = { agent: c.agent, ts: c.ts };
                        claimChanged = true;
                    }
                });
                // If our current suggestion was just claimed by someone else, pick a new one
                if (claimChanged && updateFinPlaceholder._lastSuggested &&
                    isFinClaimed(updateFinPlaceholder._lastSuggested)) {
                    updateFinPlaceholder._lastSuggested = null;
                    updateFinPlaceholder();
                }
            }

            return anyChanged;
        }

        function handleP2PMessage(msg, fromPeer) {
            if (msg.type === 'FULL_SYNC' || msg.type === 'DELTA_SYNC') {
                const changed = applyIncomingSyncMsg(msg, fromPeer);

                // Record when we last synced with this peer
                const nowTs = Date.now();
                lastSyncTs[fromPeer] = nowTs;

                if (changed) setSyncStatus('synced', Object.keys(p2pConnections).length);

                // Reply with our own delta of anything newer than what they told us they had
                const replyConn = p2pConnections[fromPeer];
                if (replyConn && replyConn.open) {
                    const theirSinceTs = msg.sinceTs || 0;
                    const replyDelta = buildDelta(theirSinceTs);
                    const hasData = Object.keys(replyDelta.finTable).length > 0 ||
                                    Object.keys(replyDelta.assetIndex).length > 0 ||
                                    Object.keys(replyDelta.nroIndex).length > 0 ||
                                    Object.keys(replyDelta.scheduleData).length > 0;
                    if (hasData || theirSinceTs === 0) {
                        // Include our active claims in the reply too
                        const activeClaims = {};
                        const replyNow = Date.now();
                        Object.entries(finClaims).forEach(([fin, c]) => {
                            if (replyNow - c.ts <= CLAIM_TTL_MS) activeClaims[fin] = c;
                        });
                        replyConn.send({ type: theirSinceTs === 0 ? 'FULL_SYNC' : 'DELTA_SYNC', sinceTs: theirSinceTs, ...replyDelta, finClaims: activeClaims });
                    }
                }
                return;
            }

            if (msg.type === 'NEW_ENTRY') {
                const inEntry = msg.entry;
                // Only update backend tables — do NOT add to db or history tab
                updateFinTable(inEntry);
                addToSharedDb(inEntry);
                setSyncStatus('synced', Object.keys(p2pConnections).length);
            }

            if (msg.type === 'AGENT_REF_SYNC') {
                if (msg.agentRef && Array.isArray(msg.agentRef)) {
                    // Merge tombstones first
                    if (msg.agentBlock && typeof msg.agentBlock === 'object') {
                        Object.entries(msg.agentBlock).forEach(([v, ts]) => {
                            if (!agentBlock[v] || ts > agentBlock[v]) agentBlock[v] = ts;
                        });
                        saveAgentBlock();
                    }
                    let agentChanged = false;
                    msg.agentRef.forEach(incoming => {
                        const tombstoneTs = agentBlock[incoming.value] || 0;
                        if (tombstoneTs > (incoming._ts || 0)) return; // tombstone must be strictly newer // tombstone wins
                        const existing = agentRef.find(a => a.value === incoming.value);
                        if (!existing) { agentRef.push(incoming); agentChanged = true; }
                        else if ((incoming._ts || 0) > (existing._ts || 0)) { Object.assign(existing, incoming); agentChanged = true; }
                    });
                    const before = agentRef.length;
                    agentRef = agentRef.filter(a => {
                        const tombTs = agentBlock[a.value] || 0;
                        return tombTs <= (a._ts || 0); // keep if tombstone is same age or older
                    });
                    if (agentRef.length !== before) agentChanged = true;
                    if (agentChanged) {
                        agentRef.sort((a, b) => a.station.localeCompare(b.station) || a.displayName.localeCompare(b.displayName));
                        saveAgentRef();
                        rebuildAgentDropdown();
                        syncAllAgentsFromRef();
                        if (activeRefTab === 'agents') renderRefList();
                    }
                }
                return;
            }

            if (msg.type === 'CLAIM_FIN') {
                if (msg.fin && msg.agent && msg.ts) {
                    // Only store if newer than existing claim
                    const existing = finClaims[msg.fin];
                    if (!existing || msg.ts > existing.ts) {
                        finClaims[msg.fin] = { agent: msg.agent, ts: msg.ts };
                        // If this FIN is our current suggestion, re-suggest
                        if (updateFinPlaceholder._lastSuggested === msg.fin) {
                            updateFinPlaceholder._lastSuggested = null;
                            updateFinPlaceholder();
                        }
                    }
                }
            }

            if (msg.type === 'RELEASE_FIN') {
                if (msg.fin && finClaims[msg.fin]) {
                    delete finClaims[msg.fin];
                    // Re-run suggestion in case this FIN was blocking ours
                    if (!document.getElementById('field-fin')?.value) {
                        updateFinPlaceholder();
                    }
                }
            }
        }

        // Called from handleSave — broadcast newly saved entry to all peers
        function broadcastNewEntry(entry) {
            const msg = { type: 'NEW_ENTRY', entry };
            const peers = Object.keys(p2pConnections);
            if (peers.length > 0) {
                peers.forEach(pid => conn_p2p_send(pid, msg));
                setSyncStatus('synced', peers.length);
            } else {
                // Queue for when a peer connects
                p2pOfflineQueue.push(msg);
                try { localStorage.setItem(P2P_QUEUE_KEY, JSON.stringify(p2pOfflineQueue)); } catch(e) {}
            }
        }

        function flushP2PQueue() {
            if (p2pOfflineQueue.length === 0) return;
            const peers = Object.keys(p2pConnections);
            if (peers.length === 0) return;
            p2pOfflineQueue.forEach(msg => peers.forEach(pid => conn_p2p_send(pid, msg)));
            p2pOfflineQueue = [];
            try { localStorage.setItem(P2P_QUEUE_KEY, JSON.stringify([])); } catch(e) {}
        }

        function startPeriodicSync(agentValue) {
            const P2P_SYNC_INTERVAL_MS = 1 * 60 * 1000; // 1 minute
            if (p2pSyncInterval) clearInterval(p2pSyncInterval);
            p2pSyncInterval = setInterval(() => {
                // Re-attempt any peers not currently connected
                connectToAllPeers(agentValue);
                // Send a full sync to all currently connected peers
                const peers = Object.keys(p2pConnections);
                if (peers.length > 0) {
                    const activeClaims = {};
                    const nowClaims = Date.now();
                    Object.entries(finClaims).forEach(([fin, c]) => {
                        if (nowClaims - c.ts <= CLAIM_TTL_MS) activeClaims[fin] = c;
                    });
                    peers.forEach(pid => {
                        const sinceTs = lastSyncTs[pid] || 0;
                        const delta = buildDelta(sinceTs);
                        const msgType = sinceTs === 0 ? 'FULL_SYNC' : 'DELTA_SYNC';
                        conn_p2p_send(pid, { type: msgType, sinceTs, ...delta, finClaims: activeClaims });
                    });
                }
            }, P2P_SYNC_INTERVAL_MS);
        }

        function conn_p2p_send(peerId, msg) {
            const conn = p2pConnections[peerId];
            if (conn && conn.open) {
                conn.send(msg);
            }
        }

        // ─── Sync status indicator ────────────────────────────────────────────
        function setSyncStatus(state, peerCount = 0) {
            const dot   = document.getElementById('sync-dot');
            const label = document.getElementById('sync-label');
            const peersEl = document.getElementById('sync-peers');
            if (!dot || !label) return;
            dot.className = 'w-2 h-2 rounded-full inline-block';
            if (state === 'online' || state === 'synced') {
                dot.classList.add('sync-dot-online');
                label.textContent = peerCount > 0 ? peerCount + ' peer' + (peerCount > 1 ? 's' : '') : 'Ready';
                label.style.color = '#34d399';
            } else if (state === 'connecting') {
                dot.classList.add('sync-dot-syncing');
                label.textContent = 'Connecting';
                label.style.color = '#93c5fd';
                if (peersEl) peersEl.textContent = '';
            } else {
                dot.classList.add('sync-dot-offline');
                label.textContent = 'P2P';
                label.style.color = '#475569';
                if (peersEl) peersEl.textContent = '';
            }
            // Update peer names line
            if (peersEl && (state === 'online' || state === 'synced')) {
                const names = Object.keys(p2pConnections).map(peerId => {
                    // peerId format: ggcsync-first-last — extract first name, capitalise
                    const parts = peerId.replace('ggcsync-', '').split('-');
                    return parts[0] ? parts[0].charAt(0).toUpperCase() + parts[0].slice(1) : peerId;
                });
                peersEl.textContent = names.join(' ');
                peersEl.style.color = '#6b7280';
            }
        }

        function updateSyncCount() {
            const count = Object.keys(p2pConnections).length;
            setSyncStatus(count > 0 ? 'online' : 'online', count);
        }

    </script>

    <script>
        // ─── PWA: Service Worker Registration ───────────────────────────────
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => {
                        console.log('[PWA] SW registered:', reg.scope);
                        reg.update();
                    })
                    .catch(err => console.warn('[PWA] SW registration failed:', err));
            });
        }

        // ─── PWA: Install Prompt ─────────────────────────────────────────────
        let deferredInstallPrompt = null;

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredInstallPrompt = e;
            showInstallBanner();
        });

        function showInstallBanner() {
            if (window.matchMedia('(display-mode: standalone)').matches) return;
            if (document.getElementById('pwa-install-banner')) return;
            const banner = document.createElement('div');
            banner.id = 'pwa-install-banner';
            banner.style.cssText = [
                'position:fixed','bottom:80px','left:50%','transform:translateX(-50%)',
                'background:#1e293b','border:1px solid #334155','color:white',
                'padding:12px 20px','border-radius:16px','z-index:9999',
                'display:flex','align-items:center','gap:12px',
                'box-shadow:0 8px 32px rgba(0,0,0,0.4)',
                'max-width:340px','width:calc(100% - 32px)',
                'font-family:sans-serif','font-size:13px'
            ].join(';');
            banner.innerHTML = `
                <div style="width:36px;height:36px;background:#3b82f6;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;flex-shrink:0;">A</div>
                <div style="flex:1;">
                    <div style="font-weight:700;margin-bottom:2px;">Install Service Report</div>
                    <div style="color:#94a3b8;font-size:11px;">Works offline · Fast load · No browser bar</div>
                </div>
                <button onclick="installPWA()" style="background:#3b82f6;color:white;border:none;padding:8px 14px;border-radius:10px;font-weight:700;font-size:12px;cursor:pointer;flex-shrink:0;">Install</button>
                <button onclick="dismissInstallBanner()" style="background:transparent;color:#475569;border:none;padding:4px;cursor:pointer;font-size:18px;line-height:1;flex-shrink:0;">×</button>
            `;
            document.body.appendChild(banner);
        }

        function installPWA() {
            if (!deferredInstallPrompt) return;
            deferredInstallPrompt.prompt();
            deferredInstallPrompt.userChoice.then((choice) => {
                if (choice.outcome === 'accepted') showToast('App installed!');
                deferredInstallPrompt = null;
                dismissInstallBanner();
            });
        }

        function dismissInstallBanner() {
            const b = document.getElementById('pwa-install-banner');
            if (b) b.remove();
        }

        window.addEventListener('appinstalled', () => {
            showToast('Service Report installed!');
            dismissInstallBanner();
        });
    </script>
