<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Service Report</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Service Report">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.875rem; font-weight: 600; color: #374151; margin-bottom: 0.25rem; }
        .sub-label { font-size: 0.75rem; color: #6b7280; margin-bottom: 0.1rem; }
        input, select, textarea { 
            width: 100%; 
            padding: 0.625rem; 
            border: 1px solid #d1d5db; 
            border-radius: 0.5rem; 
            background-color: #ffffff;
            font-size: 1rem;
            transition: all 0.2s;
            -webkit-appearance: none;
            appearance: none;
        }
        select {
            -webkit-appearance: listbox;
            appearance: auto;
        }
        input:focus, select:focus, textarea:focus { 
            border-color: #3b82f6; 
            outline: none; 
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); 
            background-color: #fff;
        }
        /* Validation Styling */
        input.invalid-asset {
            border-color: #ef4444 !important;
            background-color: #fef2f2 !important;
            color: #b91c1c !important;
        }
        
        .tab-btn { position: relative; }
        .tab-btn.active { color: #3b82f6; }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 25%;
            right: 25%;
            height: 3px;
            background: #3b82f6;
            border-radius: 3px 3px 0 0;
        }
        
        .checkbox-container {
            display: flex;
            align-items: center;
            height: 42px;
        }
        .checkbox-container input {
            width: 1.25rem;
            height: 1.25rem;
            margin-right: 0.5rem;
            cursor: pointer;
            -webkit-appearance: checkbox;
            appearance: checkbox;
        }

        #editor-modal { display: none; }
        #editor-modal.open { display: flex; }

        @keyframes pulse-sync {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .sync-dot-online { background-color: #10b981 !important; box-shadow: 0 0 6px #10b981; }
        .sync-dot-syncing { background-color: #3b82f6 !important; animation: pulse-sync 0.8s ease-in-out infinite; }
        .sync-dot-offline { background-color: #475569 !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <header class="bg-slate-900 text-white p-4 shadow-lg sticky top-0 z-30">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center font-bold text-lg">A</div>
                <h1 class="text-xl font-bold tracking-tight">Service Report</h1>
            </div>
            <button id="export-btn" onclick="exportToCSV()" class="bg-emerald-500 hover:bg-emerald-600 px-4 py-2 rounded-lg text-sm font-bold transition-all shadow-md active:scale-95 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                Export CSV
            </button>
            <button id="email-btn" onclick="emailCSV()" class="bg-blue-500 hover:bg-blue-600 px-4 py-2 rounded-lg text-sm font-bold transition-all shadow-md active:scale-95 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                </svg>
                Email
            </button>
            <div id="sync-status" title="P2P Sync Status" class="flex items-center gap-1.5 px-3 py-2 rounded-lg bg-slate-800 border border-slate-700 text-xs font-bold font-mono cursor-default select-none">
                <span id="sync-dot" class="w-2 h-2 rounded-full bg-slate-600 inline-block shrink-0"></span>
                <div class="flex flex-col leading-tight">
                    <span id="sync-label" class="text-slate-500">P2P</span>
                    <span id="sync-peers" class="text-[9px] font-bold text-slate-500 leading-tight"></span>
                </div>
            </div>
        </div>
    </header>

    <nav class="bg-white border-b flex sticky top-[68px] z-20 shadow-sm">
        <button id="tab-form" onclick="switchTab('form')" class="tab-btn active flex-1 py-4 text-center font-bold transition-colors">NEW ENTRY</button>
        <button id="tab-records" onclick="switchTab('records')" class="tab-btn flex-1 py-4 text-center font-bold transition-colors text-slate-500">HISTORY (<span id="count">0</span>)</button>
        <button id="tab-priority" onclick="switchTab('priority')" class="tab-btn flex-1 py-4 text-center font-bold transition-colors text-slate-500">PRIORITY</button>
    </nav>

    <main class="container mx-auto p-4 pb-24 max-w-2xl">
        <section id="section-form" class="space-y-4">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <form id="dataForm" onsubmit="handleSave(event)">
                    
                    <div class="flex justify-between items-center mb-6 border-b border-slate-100 pb-4">
                        <h2 id="flight-header-label" class="text-lg font-extrabold text-slate-800 uppercase tracking-wide">Flight Details</h2>
                        <button type="button" id="toggle-inventory-btn" onclick="toggleInventoryMode()" class="bg-amber-50 text-amber-700 border border-amber-200 px-3 py-1.5 rounded-lg text-[10px] font-black hover:bg-amber-100 transition-all uppercase tracking-tighter">
                            Inventory Only Mode
                        </button>
                    </div>

                    <div id="service-specific-sections" class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="form-group">
                                <label>FIN</label>
                                <input type="text" name="FIN" id="field-fin" placeholder="e.g. AC101" pattern="^(AC|RV|QK)\d{3,4}$" class="uppercase font-mono" oninput="handleFinInput(this)" required>
                                <div id="fin-reference" class="mt-1 flex gap-2 h-6">
                                    <span id="ref-type" class="text-base font-black text-blue-600 uppercase"></span>
                                    <span id="ref-body" class="text-base font-black text-slate-400 uppercase"></span>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Flight #</label>
                                <input type="text" name="Flight#" id="field-flight" placeholder="e.g. 0123" pattern="^\d{1,4}$" class="font-mono" inputmode="numeric" maxlength="4" oninput="this.value = this.value.replace(/\D/g, '').slice(0, 4)" required>
                            </div>
                        </div>
                        <div id="fin-rotation" class="mt-1 text-base font-black text-slate-500 leading-snug min-h-[2.5rem]"></div>

                        <div class="grid grid-cols-3 gap-4 items-end">
                            <div class="form-group">
                                <label>Serviced</label>
                                <select name="Serviced" id="serviced-field" class="font-medium">
                                    <option value="Yes" selected>Yes</option>
                                    <option value="No">No</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Priority</label>
                                <select name="Priority" id="priority-field">
                                    <option value="1" selected>1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <div class="checkbox-container">
                                    <input type="checkbox" name="ServiceCall" id="service-call-check">
                                    <label for="service-call-check" class="!mb-0 !inline cursor-pointer font-bold text-blue-600">Srvc Call</label>
                                </div>
                            </div>
                        </div>

                        <h2 class="text-sm font-black mb-4 mt-8 text-slate-400 uppercase tracking-[0.2em] border-b pb-2">Equipment</h2>
                        <div class="space-y-4">
                            <div class="bg-blue-50/40 p-4 rounded-xl border border-blue-100/50">
                                <div class="grid grid-cols-3 gap-3 mb-3">
                                    <div class="col-span-1">
                                        <label class="text-blue-700">Case 1</label>
                                        <input type="text" name="Case1" maxlength="4" placeholder="000 or Msng" class="border-blue-200 text-xs">
                                    </div>
                                    <div class="col-span-1">
                                        <label class="text-blue-700">HHD 1</label>
                                        <input type="text" name="HHD1" maxlength="7" placeholder="0000 or Msng" class="border-blue-200 text-xs asset-input" oninput="validateAssetInput(this); updateBatteryPlaceholder()"><div class="typo-hint-box text-[9px] font-bold text-amber-600 mt-0.5 min-h-[12px]"></div>
                                    </div>
                                    <div class="col-span-1">
                                        <label class="text-blue-700">HHD 2</label>
                                        <input type="text" name="HHD2" id="field-hhd2" maxlength="7" placeholder="0000 or Msng" class="border-blue-200 text-xs asset-input" oninput="validateAssetInput(this); updateBatteryPlaceholder()"><div class="typo-hint-box text-[9px] font-bold text-amber-600 mt-0.5 min-h-[12px]"></div>
                                    </div>
                                </div>
                                <div class="grid grid-cols-3 gap-3">
                                    <div class="col-span-1"></div>
                                    <div class="col-span-1">
                                        <div class="sub-label">HD1(Rmvd)</div>
                                        <input type="text" name="HD1Rmvd" id="hd1-rmvd" maxlength="7" placeholder="0000" class="border-blue-200 bg-white/50 text-xs asset-input" oninput="validateAssetInput(this)"><div class="typo-hint-box text-[9px] font-bold text-amber-600 mt-0.5 min-h-[12px]"></div>
                                    </div>
                                    <div class="col-span-1">
                                        <div class="sub-label">HD2(Rmvd)</div>
                                        <input type="text" name="HD2Rmvd" id="hd2-rmvd" maxlength="7" placeholder="0000" class="border-blue-200 bg-white/50 text-xs asset-input" oninput="validateAssetInput(this)"><div class="typo-hint-box text-[9px] font-bold text-amber-600 mt-0.5 min-h-[12px]"></div>
                                    </div>
                                </div>
                            </div>
                            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                                <div class="grid grid-cols-3 gap-3 mb-3">
                                    <div class="col-span-1">
                                        <label>Case 2</label>
                                        <input type="text" name="Case2" id="field-case2" maxlength="4" placeholder="000 or Msng" class="text-xs">
                                    </div>
                                    <div class="col-span-1">
                                        <label>HHD 3</label>
                                        <input type="text" name="HHD3" id="field-hhd3" maxlength="7" placeholder="0000 or Msng" class="text-xs asset-input" oninput="validateAssetInput(this); updateBatteryPlaceholder()"><div class="typo-hint-box text-[9px] font-bold text-amber-600 mt-0.5 min-h-[12px]"></div>
                                    </div>
                                    <div class="col-span-1">
                                        <label>HHD 4</label>
                                        <input type="text" name="HHD4" id="field-hhd4" maxlength="7" placeholder="0000 or Msng" class="text-xs asset-input" oninput="validateAssetInput(this); updateBatteryPlaceholder()"><div class="typo-hint-box text-[9px] font-bold text-amber-600 mt-0.5 min-h-[12px]"></div>
                                    </div>
                                </div>
                                <div class="grid grid-cols-3 gap-3">
                                    <div class="col-span-1"></div>
                                    <div class="col-span-1">
                                        <div class="sub-label">HD3(Rmvd)</div>
                                        <input type="text" name="HD3Rmvd" id="hd3-rmvd" maxlength="7" placeholder="0000" class="bg-white/50 text-xs asset-input" oninput="validateAssetInput(this)"><div class="typo-hint-box text-[9px] font-bold text-amber-600 mt-0.5 min-h-[12px]"></div>
                                    </div>
                                    <div class="col-span-1">
                                        <div class="sub-label">HD4(Rmvd)</div>
                                        <input type="text" name="HD4Rmvd" id="hd4-rmvd" maxlength="7" placeholder="0000" class="bg-white/50 text-xs asset-input" oninput="validateAssetInput(this)"><div class="typo-hint-box text-[9px] font-bold text-amber-600 mt-0.5 min-h-[12px]"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4 mt-4">
                            <div class="form-group">
                                <label>Batteries (0-10)</label>
                                <input type="number" name="Battery" id="field-battery" min="0" max="10" placeholder="0">
                            </div>
                            <div class="form-group">
                                <label>Rolls (0-20)</label>
                                <input type="number" name="Rolls" min="0" max="20" placeholder="0">
                            </div>
                        </div>
                    </div>

                    <h2 id="issues-section-label" class="text-sm font-black mb-4 mt-8 text-slate-400 uppercase tracking-[0.2em] border-b pb-2">Service Issues</h2>
                    <div class="form-group">
                        <label>Reported Asset# (Last 4)</label>
                        <input type="text" name="ASST" maxlength="7" placeholder="e.g. 1234" class="asset-input" oninput="validateAssetInput(this)"><div class="typo-hint-box text-[9px] font-bold text-amber-600 mt-0.5 min-h-[12px]"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="form-group">
                            <label>Issue Category</label>
                            <select name="SrvcIssCAT" id="srvc-iss-cat-field" onchange="updateIssueOptions()">
                                <option value="">-- Select --</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Specific Issue</label>
                            <select name="SrvcIss" id="srvc-iss-field">
                                <option value="">-- Select Category --</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Issue Details</label>
                        <textarea name="IssueDetails" rows="2" placeholder="Describe fault..."></textarea>
                    </div>

                    <h2 class="text-sm font-black mb-4 mt-8 text-slate-400 uppercase tracking-[0.2em] border-b pb-2">Identification</h2>
                    <div class="grid grid-cols-3 gap-4">
                        <div class="form-group col-span-2">
                            <label>Agent Name</label>
                            <select name="Agent" id="agent-field" onchange="onAgentChange()" required>
                                <option value="">-- Select Agent --</option>
                            </select>
                        </div>
                        <div class="form-group col-span-1">
                            <label>Station</label>
                            <select name="Service Station" id="station-field" required>
                                <option value="">--</option>
                                <option value="YUL">YUL</option>
                                <option value="YYZ">YYZ</option>
                                <option value="YYC">YYC</option>
                                <option value="YVR">YVR</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>General Comments</label>
                        <textarea name="GeneralComments" rows="2" placeholder="Overall notes..."></textarea>
                    </div>

                    <div class="hidden">
                        <input type="hidden" name="Case3" value="NtRqrd">
                        <input type="hidden" name="HHD5" value="NtRqrd">
                        <input type="hidden" name="HHD6" value="NtRqrd">
                        <input type="hidden" name="HD5Rmvd" value="">
                        <input type="hidden" name="HD6Rmvd" value="">
                    </div>

                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl shadow-xl active:scale-95 transition-all mt-6 uppercase tracking-widest text-lg">
                        SAVE RECORD
                    </button>
                </form>

                <div class="mt-8 pt-4 border-t border-slate-100 flex justify-center items-center gap-2 opacity-40 hover:opacity-100 transition-opacity">
                    <span class="text-[9px] font-black uppercase tracking-[0.2em] text-slate-500">Proprietary System &copy; Michael Marques</span>
                    <div class="w-1 h-1 bg-slate-300 rounded-full"></div>
                    <button onclick="openRefEditor()" class="text-[9px] font-bold text-slate-400 hover:text-blue-500 transition-colors" id="app-version-label"></button>
                </div>
            </div>
        </section>

        <section id="section-records" class="hidden space-y-4">
            <div id="no-records" class="text-center py-16 bg-white rounded-2xl border-2 border-dashed border-slate-200 text-slate-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto mb-4 opacity-20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <p class="font-bold">No records found</p>
            </div>
            <div id="records-list" class="space-y-4"></div>
        </section>

        <section id="section-priority" class="hidden space-y-3">
            <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-3 flex flex-wrap gap-2 items-center">
                <span class="text-[9px] font-black uppercase tracking-widest text-slate-400 mr-1">Filter</span>
                <div class="flex gap-1 flex-wrap">
                    <button onclick="setPriorityFilter('airline','ALL')" id="pf-airline-ALL" class="pf-airline px-2.5 py-1 rounded-lg text-[10px] font-black border bg-slate-800 text-white border-slate-700">ALL</button>
                    <button onclick="setPriorityFilter('airline','AC')"  id="pf-airline-AC"  class="pf-airline px-2.5 py-1 rounded-lg text-[10px] font-black border bg-white text-slate-500 border-slate-200 hover:bg-slate-50">AC</button>
                    <button onclick="setPriorityFilter('airline','QK')"  id="pf-airline-QK"  class="pf-airline px-2.5 py-1 rounded-lg text-[10px] font-black border bg-white text-slate-500 border-slate-200 hover:bg-slate-50">QK</button>
                    <button onclick="setPriorityFilter('airline','RV')"  id="pf-airline-RV"  class="pf-airline px-2.5 py-1 rounded-lg text-[10px] font-black border bg-white text-slate-500 border-slate-200 hover:bg-slate-50">RV</button>
                </div>
                <div class="w-px h-5 bg-slate-200 mx-1"></div>
                <div class="flex gap-1">
                    <button onclick="setPriorityFilter('priority','ALL')" id="pf-priority-ALL" class="pf-priority px-2.5 py-1 rounded-lg text-[10px] font-black border bg-slate-800 text-white border-slate-700">ALL</button>
                    <button onclick="setPriorityFilter('priority','1')"   id="pf-priority-1"   class="pf-priority px-2.5 py-1 rounded-lg text-[10px] font-black border bg-white text-red-400 border-red-200 hover:bg-red-50">P1</button>
                    <button onclick="setPriorityFilter('priority','2')"   id="pf-priority-2"   class="pf-priority px-2.5 py-1 rounded-lg text-[10px] font-black border bg-white text-amber-500 border-amber-200 hover:bg-amber-50">P2</button>
                    <button onclick="setPriorityFilter('priority','3')"   id="pf-priority-3"   class="pf-priority px-2.5 py-1 rounded-lg text-[10px] font-black border bg-white text-emerald-500 border-emerald-200 hover:bg-emerald-50">P3</button>
                </div>
                <div class="w-px h-5 bg-slate-200 mx-1"></div>
                <input id="pf-fin" type="text" placeholder="FIN" maxlength="6"
                    oninput="renderPriorityList()"
                    class="!w-20 !text-[10px] !py-1 !px-2 uppercase font-mono border border-slate-200 rounded-lg bg-white text-slate-700 focus:border-blue-400 focus:outline-none">
            </div>
            <div id="priority-list"></div>
        </section>
    </main>

    <div id="editor-modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-4 bg-slate-100 border-b flex justify-between items-center">
                <h3 class="font-black text-slate-800 uppercase tracking-tight">System Ref Editor</h3>
                <button onclick="closeRefEditor()" class="text-slate-400 hover:text-slate-600">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            
            <div class="flex border-b text-[10px] font-black uppercase tracking-widest bg-slate-50">
                <button onclick="switchRefTab('aircraft')" id="ref-tab-aircraft" class="flex-1 py-3 border-b-2 border-blue-600 text-blue-600">Aircraft</button>
                <button onclick="switchRefTab('assets')" id="ref-tab-assets" class="flex-1 py-3 border-b-2 border-transparent text-slate-400">Asset Database</button>
                <button onclick="switchRefTab('synctable')" id="ref-tab-synctable" class="flex-1 py-3 border-b-2 border-transparent text-slate-400">Sync Table</button>
                <button onclick="switchRefTab('schedule')" id="ref-tab-schedule" class="flex-1 py-3 border-b-2 border-transparent text-slate-400">Schedule</button>
                <button onclick="switchRefTab('agents')" id="ref-tab-agents" class="flex-1 py-3 border-b-2 border-transparent text-slate-400">Agents</button>
                <button onclick="switchRefTab('alldata')" id="ref-tab-alldata" class="flex-1 py-3 border-b-2 border-transparent text-slate-400">All Data</button>
            </div>

            <div class="p-4 overflow-y-auto flex-1 space-y-4" id="ref-editor-list"></div>
            
            <div class="p-4 bg-slate-50 border-t flex gap-2" id="add-aircraft-ui">
                <input type="text" id="new-ref-prefix" placeholder="Prefix" class="w-24 uppercase font-mono !text-xs">
                <input type="text" id="new-ref-type" placeholder="Type" class="flex-1 !text-xs">
                <select id="new-ref-body" class="w-16 !text-xs">
                    <option value="NB">NB</option>
                    <option value="WB">WB</option>
                </select>
                <button onclick="addNewRef()" class="bg-blue-600 text-white px-3 py-1 rounded-lg text-xs font-bold">+</button>
            </div>

            <div class="p-4 bg-slate-50 border-t flex gap-2 hidden" id="add-asset-ui">
                <input type="text" id="new-asset-id" placeholder="Asset#" class="w-24 uppercase font-mono !text-xs">
                <input type="text" id="new-asset-name" placeholder="Item Name" class="flex-1 !text-xs">
                <button onclick="addNewAsset()" class="bg-emerald-600 text-white px-3 py-1 rounded-lg text-xs font-bold">+</button>
            </div>

            <div class="p-4 bg-slate-50 border-t hidden" id="add-agent-ui">
                <div class="flex gap-2 mb-2">
                    <input type="text" id="new-agent-name" placeholder="Full Name" class="flex-1 !text-xs">

            // Deliberately removed agents are protected by agentBlock tombstones.
            const saved = localStorage.getItem(AGENT_REF_KEY);
            const savedList = saved ? JSON.parse(saved) : null;
            const alreadyHasAgents = savedList && savedList.length > 0;
            if (alreadyHasAgents) return; // list exists and has entries — don't touch it

            agentRef.sort((a, b) => a.station.localeCompare(b.station) || a.displayName.localeCompare(b.displayName));
            saveAgentRef();
        }

                for (let i = 0; i < select.options.length; i++) {
                    if (select.options[i].value === currentVal) { select.value = currentVal; break; }

        // Derive each FIN's asset list on-the-fly from assetIndex.
        // Returns { fin: [assetId, ...] } — each asset appears on exactly one FIN.
        function buildFinAssets() {
            const map = {};
            Object.entries(assetIndex).forEach(([assetId, rec]) => {
                if (!rec.fin || rec.fin === 'INV') return;
                if (!map[rec.fin]) map[rec.fin] = [];
                map[rec.fin].push(assetId);
            });
            return map;
        }

        function updateFinTable(entry) {
            if (!entry || entry.FIN === 'INV') return;
            const fin = entry.FIN;
            const entryTs = entry.id || 0;

            // Ensure finTable row exists
            if (!finTable[fin]) {
                finTable[fin] = { type: '', body: '', lastSeen: '', lastFlight: '', lastAgent: '', lastStation: '', _ts: 0 };
            }
            // Resolve aircraft type
            const match = aircraftRef[fin.substring(0,5)] || aircraftRef[fin.substring(0,4)];
            if (match) { finTable[fin].type = match.type; finTable[fin].body = match.body; }

            // Update last seen — keep the most recent by timestamp
            if (entryTs >= (finTable[fin]._ts || 0)) {
                finTable[fin].lastSeen    = entry.displayDate || '';
                finTable[fin].lastFlight  = entry['Flight#']  || '';
                finTable[fin].lastAgent   = entry.Agent ? entry.Agent.split(',')[0].trim() : '';
                finTable[fin].lastStation = entry['Service Station'] || '';
                finTable[fin]._ts         = entryTs;

                const snapSkip = new Set(['N/A', 'NtRqrd', 'Msng', '', 'RMVD', 'Rmvd']);

                // Snapshot of HHDs actually onboard this visit — replaces previous
                const onboard = [];
                [entry.HHD1, entry.HHD2, entry.HHD3, entry.HHD4].forEach(a => {
                    if (a && !snapSkip.has(a) && !onboard.includes(a)) onboard.push(a);
                });
                finTable[fin].lastOnboard = onboard;

                // Snapshot of removed/flagged assets this visit — replaces previous
                // Exclude anything also reported onboard (onboard wins)
                const onboardSet = new Set(onboard);
                const removed = [];
                [entry.HD1Rmvd, entry.HD2Rmvd, entry.HD3Rmvd, entry.HD4Rmvd].forEach(a => {
                    if (a && !snapSkip.has(a) && !onboardSet.has(a) && !removed.includes(a)) removed.push(a);
                });
                if (entry.ASST && !snapSkip.has(entry.ASST) && !onboardSet.has(entry.ASST) && !removed.includes(entry.ASST)) removed.push(entry.ASST);
                finTable[fin].lastRemoved = removed;
            }

            const SKIP = new Set(['N/A', 'NtRqrd', 'Msng', '', 'RMVD', 'Rmvd']);

            // Assets reported onboard in this entry
            const reportedNow = new Set();
            [entry.HHD1, entry.HHD2, entry.HHD3, entry.HHD4].forEach(a => {
                if (a && !SKIP.has(a)) reportedNow.add(a);
            });

            // Assets explicitly accounted for: swapped out (HDxRmvd) or reported in ASST field
            // — exclude any that also appear in reportedNow (onboard wins, Rmvd was a mistake)
            const accountedFor = new Set();
            [entry.HD1Rmvd, entry.HD2Rmvd, entry.HD3Rmvd, entry.HD4Rmvd].forEach(a => {
                if (a && !SKIP.has(a) && !reportedNow.has(a)) accountedFor.add(a);
            });
            if (entry.ASST && !SKIP.has(entry.ASST) && !reportedNow.has(entry.ASST)) accountedFor.add(entry.ASST);

            // Check assets previously on this FIN — flag any that are unaccounted for as NRO
            Object.entries(assetIndex).forEach(([assetId, rec]) => {
                if (rec.fin !== fin) return;           // not previously on this FIN
                if (reportedNow.has(assetId)) return;  // still onboard — fine
                if (accountedFor.has(assetId)) return; // explicitly moved or flagged — fine
                // Asset was expected but missing with no explanation
                const existingNro = nroIndex[assetId];
                if (!existingNro || entryTs > (existingNro.ts || 0)) {
                    nroIndex[assetId] = { lastFin: fin, lastSeen: entry.displayDate || '', ts: entryTs };
                }
            });

            // Update assetIndex — reported assets move to this FIN
            reportedNow.forEach(a => {
                const existing = assetIndex[a];
                if (!existing || entryTs >= existing.ts) {
                    assetIndex[a] = { fin, ts: entryTs };
                    // Clear NRO if this asset is now confirmed somewhere
                    if (nroIndex[a]) delete nroIndex[a];
                }
            });

            // Clear NRO and remove from assetIndex for anything explicitly accounted for
            // — they are no longer expected on this FIN so future visits won't re-flag them
            accountedFor.forEach(a => {
                if (nroIndex[a]) delete nroIndex[a];
                if (assetIndex[a] && assetIndex[a].fin === fin) delete assetIndex[a];
            });

            saveFinTable();
            saveAssetIndex();
            saveNroIndex();
        }

        function isValidAssetId(val) {
            if (!val || val.trim() === "") return true;
            const normalized = val.trim().toLowerCase();
            if (["msng", "ntrqrd", "n/a", "rmvd"].includes(normalized)) return true;
            const num = val.replace(/\D/g, '');
            if (num === "") return false;
            const padded = num.padStart(4, '0');
            return !!assetRef[num] || !!assetRef[padded];
        }

        // Levenshtein distance between two strings
        function levenshtein(a, b) {
            const m = a.length, n = b.length;
            const dp = Array.from({ length: m + 1 }, (_, i) => [i, ...Array(n).fill(0)]);
            for (let j = 0; j <= n; j++) dp[0][j] = j;
            for (let i = 1; i <= m; i++) {
                for (let j = 1; j <= n; j++) {
                    dp[i][j] = a[i-1] === b[j-1]
                        ? dp[i-1][j-1]
                        : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
                }
            }
            return dp[m][n];
        }

        // Find the closest known asset to the entered value (within edit distance threshold)
        function findTypoSuggestion(val) {
            const SKIP = new Set(['msng', 'ntrqrd', 'n/a', 'rmvd', '']);
            const norm = val.trim().toLowerCase();
            if (SKIP.has(norm)) return null;

            // Work purely on the 4-digit numeric portion for comparison
            const enteredNum = val.replace(/\D/g,'').padStart(4, '0');
            if (enteredNum.replace(/0/g,'') === '') return null; // all zeros — skip
            const enteredFormatted = 'GGC' + enteredNum;

            let best = null, bestDist = Infinity;

            // 1. Check assets currently tracked on the FIN entered in the form (highest priority)
            const currentFin = (document.getElementById('field-fin')?.value || '').trim().toUpperCase();
            if (currentFin) {
                Object.entries(assetIndex).forEach(([known, rec]) => {
                    if (rec.fin !== currentFin) return;
                    const knownNum = known.replace(/\D/g,'').padStart(4,'0');
                    if (knownNum === enteredNum) return; // exact — no suggestion
                    const dist = levenshtein(enteredNum, knownNum);
                    if (dist <= 2 && dist < bestDist) {
                        bestDist = dist;
                        best = { id: 'GGC' + knownNum, fin: currentFin, dist, onCurrentFin: true };
                    }
                });
            }

            // 2. Check all tracked assets in assetIndex
            Object.entries(assetIndex).forEach(([known, rec]) => {
                const knownNum = known.replace(/\D/g,'').padStart(4,'0');
                if (knownNum === enteredNum) return;
                const dist = levenshtein(enteredNum, knownNum);
                if (dist <= 2 && dist < bestDist) {
                    bestDist = dist;
                    best = { id: 'GGC' + knownNum, fin: rec.fin || null, dist, onCurrentFin: false };
                }
            });

            // 3. Always search assetRef (full DB) — catches cases where assetIndex has no history yet
            Object.keys(assetRef).forEach(refId => {
                const refNum = String(refId).padStart(4,'0');
                if (refNum === enteredNum) return; // exact match — this IS the entered asset
                const dist = levenshtein(enteredNum, refNum);
                if (dist <= 2 && dist < bestDist) {
                    bestDist = dist;
                    const tracked = assetIndex['GGC' + refNum];
                    best = { id: 'GGC' + refNum, fin: tracked?.fin || null, dist, onCurrentFin: tracked?.fin === currentFin };
                }
            });

            // Suppress distance-2 suggestions for valid entries unless it's on the current FIN — too noisy otherwise
            if (!best) return null;
            if (best.dist === 2 && isValidAssetId(val) && !best.onCurrentFin) return null;
            return best;
        }

        let _typoHideTimer = null;

        function showTypoHint(el, suggestion) {
            if (!suggestion) return;
            const hintBox = el.nextElementSibling;
            if (!hintBox || !hintBox.classList.contains('typo-hint-box')) return;
            const finNote = suggestion.onCurrentFin
                ? ' · already on this aircraft'
                : suggestion.fin ? ` · last on ${suggestion.fin}` : '';
            hintBox.textContent = `⚠️ Did you mean ${suggestion.id}?${finNote}`;
            // Auto-clear after 6s
            clearTimeout(el._typoTimer);
            el._typoTimer = setTimeout(() => { hintBox.textContent = ''; }, 6000);
        }

        function hideTypoHint(el) {
            if (!el) {
                // Clear all hint boxes
                document.querySelectorAll('.typo-hint-box').forEach(b => b.textContent = '');
                return;
            }
            const hintBox = el.nextElementSibling;
            if (hintBox && hintBox.classList.contains('typo-hint-box')) hintBox.textContent = '';
        }

        function validateAssetInput(el) {
            const val = el.value.trim();
            const SKIP = new Set(['msng', 'ntrqrd', 'n/a', 'rmvd', '']);
            const norm = val.toLowerCase();

            if (!isValidAssetId(val)) {
                el.classList.add('invalid-asset');
            } else {
                el.classList.remove('invalid-asset');
            }

            // Run typo check whenever there are enough digits and it's not a skip word
            if (val.replace(/\D/g,'').length >= 3 && !SKIP.has(norm)) {
                const suggestion = findTypoSuggestion(val);
                if (suggestion) showTypoHint(el, suggestion);
                else hideTypoHint(el);
            } else {
                hideTypoHint(el);
            }
        }

        function renderSyncTable(container) {
            const stFin   = (document.getElementById('st-fin')?.value   || '').trim().toUpperCase();
            const stAsset = (document.getElementById('st-asset')?.value || '').trim();

            let fins = Object.keys(finTable).sort();

            // FIN filter — simple substring match
            if (stFin) fins = fins.filter(f => f.includes(stFin));

            // Asset filter — keep only FINs whose lastOnboard or lastRemoved includes the asset
            if (stAsset) {
                fins = fins.filter(f => {
                    const e = finTable[f];
                    const onboard = e.lastOnboard || [];
                    const removed = e.lastRemoved || [];
                    // Also check assetIndex — asset may be tracked to this FIN even if not in last snapshot
                    const inAssetIndex = assetIndex[stAsset] && assetIndex[stAsset].fin === f;
                    return onboard.some(a => a.includes(stAsset)) ||
                           removed.some(a => a.includes(stAsset)) ||
                           inAssetIndex;
                });
            }

            if (fins.length === 0) {
                container.innerHTML = `<div class="text-center py-8 text-slate-400 text-xs font-bold uppercase tracking-widest">No records saved yet</div>`;
                return;
            }

            // Build a per-FIN NRO lookup: fin → [{assetId, lastSeen, ts}]
            const finNro = {};
            Object.entries(nroIndex).forEach(([assetId, rec]) => {
                if (!rec.lastFin) return;
                if (!finNro[rec.lastFin]) finNro[rec.lastFin] = [];
                finNro[rec.lastFin].push({ assetId, lastSeen: rec.lastSeen, ts: rec.ts });
            });

            // Header — 5-column layout: FIN | Type | Assets on FIN | Last | NRO
            const header = document.createElement('div');
            header.className = "grid gap-1 px-2 py-1 text-[9px] font-black uppercase tracking-widest text-slate-400 border-b border-slate-200 sticky top-0 bg-white";
            header.style.gridTemplateColumns = "3rem 3.5rem 1fr 5rem 3rem 1fr";
            header.innerHTML = `
                <span>FIN</span>
                <span>Type</span>
                <span>Assets Onboard</span>
                <span>Agent / Stn</span>
                <span>Last</span>
                <span class="text-amber-500">NRO</span>`;
            container.appendChild(header);

            fins.forEach(fin => {
                const entry = finTable[fin];
                const bodyColor = entry.body === 'WB' ? 'text-purple-600' : 'text-slate-400';

                // Assets onboard from most recent entry only (HHD1–4 snapshot)
                const numSort = (a, b) => parseInt(a.replace(/\D/g,'')) - parseInt(b.replace(/\D/g,''));
                const onboardAssets = (entry.lastOnboard || []).slice().sort(numSort);
                const onboardHtml = onboardAssets.length > 0
                    ? onboardAssets.map(a => `<span class="text-slate-600">${a}</span>`).join(', ')
                    : '<span class="text-slate-300">—</span>';

                // Removed/flagged assets from last visit (HDxRmvd + ASST)
                const removedAssets = (entry.lastRemoved || []).slice().sort(numSort);
                const removedHtml = removedAssets.length > 0
                    ? '<span class="text-red-500 text-[8px] font-black uppercase tracking-wide block mt-0.5">Rmvd: </span>' +
                      removedAssets.map(a => `<span class="text-red-600 font-black">${a}</span>`).join(', ')
                    : '';

                // NRO items for this FIN, sorted numerically
                const nroItems = (finNro[fin] || []).slice().sort((a, b) => parseInt(a.assetId.replace(/\D/g,'')) - parseInt(b.assetId.replace(/\D/g,'')));
                const nroCell = nroItems.length > 0
                    ? nroItems.map(n => `<span class="text-amber-600 font-black">${n.assetId}</span><span class="text-amber-600 ml-0.5 text-[8px]">${n.lastSeen || ''}</span>`).join('<br>')
                    : '<span class="text-slate-200">—</span>';

                const agentDisplay = entry.lastAgent
                    ? `<span class="font-bold text-slate-600">${entry.lastAgent}</span>${entry.lastStation ? `<span class="block text-[8px] font-black text-slate-400">${entry.lastStation}</span>` : ''}`
                    : '<span class="text-slate-200">—</span>';

                const div = document.createElement('div');
                div.className = "grid gap-1 px-2 py-2 text-[10px] border-b border-slate-100 hover:bg-slate-50 items-start";
                div.style.gridTemplateColumns = "3rem 3.5rem 1fr 5rem 3rem 1fr";
                div.innerHTML = `
                    <span class="font-mono font-black text-blue-600">${fin}</span>
                    <span class="font-bold text-slate-700">
                        ${entry.type || '—'}
                        ${entry.body ? `<span class="block text-[8px] font-black ${bodyColor}">${entry.body}</span>` : ''}
                    </span>
                    <span class="font-mono text-[9px] leading-relaxed">${onboardHtml}${removedHtml}</span>
                    <span class="text-[9px] leading-relaxed">${agentDisplay}</span>
                    <span class="text-slate-400 text-[9px]">${entry.lastSeen || '—'}</span>
                    <span class="font-mono text-[9px] leading-relaxed">${nroCell}</span>`;
                container.appendChild(div);
            });

            // Summary footer
            const nroTotal = Object.keys(nroIndex).length;
            const footer = document.createElement('div');
            footer.className = "mt-3 pt-3 border-t border-slate-200 flex items-center justify-between gap-2";
            footer.innerHTML = `
                <span class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">
                    ${fins.length} aircraft · ${db.filter(r => r.FIN !== 'INV').length} service entries · ${Object.keys(assetIndex).length} assets tracked`
                    + (nroTotal > 0 ? ` · <span class="text-amber-500">${nroTotal} NRO</span>` : '') + `
                </span>
                <button onclick="exportSyncTableCSV()"
                    class="flex items-center gap-1.5 bg-emerald-500 hover:bg-emerald-600 text-white px-3 py-1.5 rounded-lg text-[10px] font-black transition-all active:scale-95 shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                    Export CSV
                </button>`;
            container.appendChild(footer);
        }

        function getBodyType(fin) {
            if (!fin) return "NB";
            let match = aircraftRef[fin.substring(0,5)] || aircraftRef[fin.substring(0,4)];
            return match ? match.body : "NB";
        }

        // Station → IANA timezone map
        const STATION_TZ = {
            'YYZ': 'America/Toronto',
            'YUL': 'America/Toronto',
            'YYC': 'America/Edmonton',
            'YVR': 'America/Vancouver'
        };

        // Returns the best upcoming rotation object for a FIN, or null
        function getNextRotation(fin) {
            const rotations = scheduleData[fin];
            if (!rotations || rotations.length === 0) return null;
            const now = new Date();
            const agentStation = (document.getElementById('station-field')?.value || '').toUpperCase();
            const grace = new Date(now.getTime() - 30 * 60000);
            const parseOdt = (odt) => { if (!odt) return null; const d = new Date(odt); return isNaN(d) ? null : d; };
            const upcoming = rotations.filter(r => { const d = parseOdt(r.odt); return d && d >= grace; })
                .sort((a, b) => parseOdt(a.odt) - parseOdt(b.odt));
            if (upcoming.length === 0) return null;
            return agentStation
                ? (upcoming.find(r => (r.stn || '').toUpperCase() === agentStation) || upcoming[0])
                : upcoming[0];
        }

        // Returns a single display line for the next/current rotation for a given FIN
        function getNextRotationLine(fin) {
            const rot = getNextRotation(fin);
            if (!rot) return '';

            const agentStation = (document.getElementById('station-field')?.value || '').toUpperCase();
            const agentTz = STATION_TZ[agentStation] || Intl.DateTimeFormat().resolvedOptions().timeZone;
            const parseT  = (v) => { if (!v) return null; const d = new Date(v); return isNaN(d) ? null : d; };
            const fmtInTz = (d, tz) => d.toLocaleTimeString('en-CA', { hour: '2-digit', minute: '2-digit', hour12: false, timeZone: tz });

            const odtDate = parseT(rot.odt);
            const idtDate = parseT(rot.idt);
            if (!odtDate) return '';

            const rotStn = (rot.stn  || '').toUpperCase();
            const iStn   = (rot.iStn || '').toUpperCase();
            const oStn   = (rot.oStn || '').toUpperCase();
            const rotTz  = STATION_TZ[rotStn] || agentTz;
            const iStnTz = STATION_TZ[iStn]   || agentTz;
            const atStation = agentStation && rotStn === agentStation;

            // ODT: show in rotation's station tz, with agent-local equivalent if different
            const odtRot   = fmtInTz(odtDate, rotTz);
            const odtLocal = (rotTz !== agentTz) ? ' (' + fmtInTz(odtDate, agentTz) + ' ' + agentStation + ')' : '';

            // IDT: only show if it has a meaningful time (non-midnight UTC)
            let idtStr = '';
            if (idtDate && (idtDate.getUTCHours() > 0 || idtDate.getUTCMinutes() > 0)) {
                idtStr = fmtInTz(idtDate, iStnTz);
                if (iStnTz !== agentTz) idtStr += ' (' + fmtInTz(idtDate, agentTz) + ' ' + agentStation + ')';
            }

            const iflt = (rot.iflt || '');
            const oflt = (rot.oflt || '');
            const inGt = (rot.inGt || '');
            const oGt  = (rot.oGt  || '');

            // Format: route line + separate times line
            let routeParts = [];
            const ifltNum = (iflt || '').replace(/\D/g, '');
            if (!iflt || ifltNum === '0000' || iflt === 'AC0000') routeParts.push('ORG');
            else routeParts.push(iflt);
            if (inGt) routeParts.push('IGT:' + inGt);
            routeParts.push(iStn + ' → ' + rotStn + ' → ' + oStn);
            if (oGt)  routeParts.push('OGT:' + oGt);
            if (oflt) routeParts.push(oflt);
            if (!atStation) routeParts.push('[' + rotStn + ']');

            let timeParts = [];
            if (idtStr) timeParts.push('✈in ' + idtStr);
            timeParts.push('✈out ' + odtRot + odtLocal);

            return `<span class="block text-slate-500">${routeParts.join('  ')}</span>`
                 + `<span class="block text-[13px] font-black text-blue-600 mt-0.5">${timeParts.join('   ')}</span>`;
        }

        function handleFinInput(el) {
            el.value = el.value.toUpperCase();
            const val = el.value;
            const refType = document.getElementById('ref-type');
            const refBody = document.getElementById('ref-body');
            refType.textContent = "";
            refBody.textContent = "";

            const case2  = document.getElementById('field-case2');
            const hhd2   = document.getElementById('field-hhd2');
            const hhd3   = document.getElementById('field-hhd3');
            const hhd4   = document.getElementById('field-hhd4');

            // Reset placeholders to default
            case2.placeholder = "000 or Msng";
            hhd2.placeholder  = "0000 or Msng";
            hhd3.placeholder  = "0000 or Msng";
            hhd4.placeholder  = "0000 or Msng";

            // Auto-set priority from computed priority list whenever FIN is long enough to match
            const priorityField = document.getElementById('priority-field');
            const rotationEl    = document.getElementById('fin-rotation');

            // If field cleared, release any claim and restore placeholder suggestions
            if (val.length === 0) {
                priorityField.value = '1';
                if (updateFinPlaceholder._lastSuggested) {
                    releaseFin(updateFinPlaceholder._lastSuggested);
                    updateFinPlaceholder._lastSuggested = null;
                }
                updateFinPlaceholder();
                return;
            }

            if (val.length >= 5) {
                const p = computeFinPriority(val);
                priorityField.value = String(p);
                // Populate next rotation line from scheduleData
                rotationEl.innerHTML = getNextRotationLine(val);

                // Prepopulate Flight# placeholder from inbound flight number (numeric portion)
                // Fall back to outbound if inbound is 0000
                const flightField = document.getElementById('field-flight');
                const rot = getNextRotation(val);
                if (rot && flightField && !flightField.value) {
                    const ifltNum = (rot.iflt || '').replace(/\D/g, '').replace(/^0+/, '') || '0000';
                    const ofltNum = (rot.oflt || '').replace(/\D/g, '').replace(/^0+/, '') || '0000';
                    const useNum  = (ifltNum === '0' || ifltNum === '0000' || ifltNum === '') ? ofltNum : ifltNum;
                    flightField.placeholder = useNum.padStart(4, '0');
                } else if (!rot && flightField) {
                    flightField.placeholder = 'e.g. 0123';
                }
            } else {
                priorityField.value = '1';
                rotationEl.innerHTML = '';
                const flightField = document.getElementById('field-flight');
            }

            if (val.length >= 2) {
                let match = aircraftRef[val.substring(0,5)] || aircraftRef[val.substring(0,4)];
                if (match) {
                    refType.textContent = match.type;
                    refBody.textContent = match.body;
                    refBody.className = match.body === "WB" ? "text-base font-black text-purple-600 uppercase" : "text-base font-black text-slate-400 uppercase";

                    const isNB = match.body === "NB";
                    const isQK = val.startsWith("QK");

                    if (isNB) {

        // ─── FIN Claim System ────────────────────────────────────────────────
        const CLAIM_TTL_MS = 30 * 60 * 1000; // 30 minutes

        function claimFin(fin) {
            if (!fin) return;
            const agentVal = document.getElementById('agent-field')?.value || '';
            const agentName = agentVal.split(',')[0].trim();
            finClaims[fin] = { agent: agentName, ts: Date.now() };
            // Broadcast to peers
            const msg = { type: 'CLAIM_FIN', fin, agent: agentName, ts: finClaims[fin].ts };
            Object.keys(p2pConnections).forEach(pid => conn_p2p_send(pid, msg));
        }

        function releaseFin(fin) {
            if (!fin || !finClaims[fin]) return;
            delete finClaims[fin];
            const msg = { type: 'RELEASE_FIN', fin };
            Object.keys(p2pConnections).forEach(pid => conn_p2p_send(pid, msg));
        }

        function isFinClaimed(fin) {
            const claim = finClaims[fin];
            if (!claim) return false;
            // Expire stale claims
            if (Date.now() - claim.ts > CLAIM_TTL_MS) { delete finClaims[fin]; return false; }
            // Don't block our own claim
            const agentVal = document.getElementById('agent-field')?.value || '';
            const myName = agentVal.split(',')[0].trim();
            return claim.agent !== myName;
        }

        // Returns the FIN of the highest-priority P1 aircraft with an upcoming rotation at the agent's station
        // Priority: 1) most days since last serviced (never = highest), 2) airline AC > RV > QK, 3) earliest ODT
        function getNextP1Fin() {
            const agentStation = (document.getElementById('station-field')?.value || '').toUpperCase();
            if (!agentStation) return null;

            const now    = new Date();
            const today  = new Date(now); today.setHours(0,0,0,0);
            const grace  = new Date(now.getTime() - 30 * 60000);
            const parseT = (v) => { if (!v) return null; const d = new Date(v); return isNaN(d) ? null : d; };

            const AIRLINE_RANK = { 'AC': 0, 'RV': 1, 'QK': 2 };

            // Days since last serviced — higher = more overdue; never serviced = 9999
            const daysOverdue = (fin) => {
                const entry = finTable[fin];
                if (!entry || !entry.lastSeen) return 9999;
                const parts = entry.lastSeen.split('/');
                let d;
                if (parts.length === 3) {
                    const yr1 = parts[2].length === 2 ? 2000 + parseInt(parts[2]) : parseInt(parts[2]);
                    d = new Date(yr1, parts[0]-1, parts[1]);
                    if (isNaN(d)) d = new Date(yr1, parts[1]-1, parts[0]);
                } else { d = new Date(entry.lastSeen); }
                if (isNaN(d)) return 9999;
                d.setHours(0,0,0,0);
                return Math.round((today - d) / 86400000);
            };

            const allFins = new Set([...Object.keys(finTable), ...Object.keys(aircraftRef)]);
            const candidates = [];

            allFins.forEach(fin => {
                if (computeFinPriority(fin) !== 1) return;
                const rotations = scheduleData[fin];
                if (!rotations || rotations.length === 0) return;

                const minService = new Date(now.getTime() + 20 * 60000); // must have 20min remaining
                const upcoming = rotations
                    .filter(r => { const d = parseT(r.odt); return d && d >= minService && (r.stn || '').toUpperCase() === agentStation; })
                    .sort((a, b) => parseT(a.odt) - parseT(b.odt));
                if (upcoming.length === 0) return;

                const airline = fin.substring(0, 2).toUpperCase();
                // Skip FINs claimed by another active agent
                if (isFinClaimed(fin)) return;

                candidates.push({
                    fin,
                    days:        daysOverdue(fin),
                    airlineRank: AIRLINE_RANK[airline] !== undefined ? AIRLINE_RANK[airline] : 99,
                    odt:         parseT(upcoming[0].odt).getTime()
                });
            });

            if (candidates.length === 0) return null;

            // Sort: most overdue first, then airline rank, then earliest ODT
            candidates.sort((a, b) =>
                b.days - a.days ||
                a.airlineRank - b.airlineRank ||
                a.odt - b.odt
            );

            return candidates[0].fin;
        }

        // Set FIN and Flight# placeholders to next P1 aircraft at agent's station
        // Also shows rotation info under the FIN field until the user types
        function updateFinPlaceholder() {
            const finField    = document.getElementById('field-fin');
            const flightField = document.getElementById('field-flight');
            const rotationEl  = document.getElementById('fin-rotation');

            if (!finField || finField.value) return; // don't overwrite if user has typed something

            const p1Fin = getNextP1Fin();
            finField.placeholder = p1Fin ? p1Fin : 'e.g. AC101';

            if (!p1Fin) {
                if (flightField && !flightField.value) flightField.placeholder = 'e.g. 0123';
                if (rotationEl) rotationEl.innerHTML = '';
                const rt = document.getElementById('ref-type');
                const rb = document.getElementById('ref-body');
                if (rt) rt.textContent = '';

            }

            // Flight# placeholder
            if (flightField && !flightField.value) {
                const rot = getNextRotation(p1Fin);
                if (rot) {
                    const ifltNum = (rot.iflt || '').replace(/\D/g, '').replace(/^0+/, '');
                    const ofltNum = (rot.oflt || '').replace(/\D/g, '').replace(/^0+/, '');

                    flightField.placeholder = useNum ? useNum.padStart(4, '0') : 'e.g. 0123';
                } else {
                    flightField.placeholder = 'e.g. 0123';
                }
            }

            // Rotation info line — show for the suggested P1 FIN
            if (rotationEl) {
                rotationEl.innerHTML = getNextRotationLine(p1Fin);
            }

            // Populate aircraft type/body reference spans
            const refType = document.getElementById('ref-type');
            const refBody = document.getElementById('ref-body');
            if (refType && refBody) {
                const match = aircraftRef[p1Fin.substring(0,5)] || aircraftRef[p1Fin.substring(0,4)];

                }

            // Claim this FIN so other agents skip it
            claimFin(p1Fin);
            updateFinPlaceholder._lastSuggested = p1Fin;
        }

        // Parse an Excel serial date or datetime value into a JS Date
        function xlDateToDate(val) {
            if (!val) return null;
            if (val instanceof Date) return val;
            if (typeof val === 'number') {
                // Excel serial: days since 1900-01-00 (with Lotus bug offset)
                const d = new Date(Math.round((val - 25569) * 86400000));
                return d;
            }
            if (typeof val === 'string' && val.trim()) {
                const d = new Date(val);
                return isNaN(d) ? null : d;
            }
            return null;
        }

        function fmtTime(val) {
            const d = xlDateToDate(val);
            if (!d) return '';
            return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
        }

        function fmtDate(val) {
            const d = xlDateToDate(val);
            if (!d) return '';
            return d.toLocaleDateString();
        }

        function handleScheduleFile(file) {
            if (!file) return;
            const statusEl = document.getElementById('schedule-import-status');
            statusEl.textContent = 'Reading file…';
            statusEl.className = 'mt-2 text-[10px] text-center font-bold text-blue-400';

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const wb = XLSX.read(e.target.result, { type: 'array', cellDates: true });
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(ws, { defval: '', raw: false });
                    const rawRows = XLSX.utils.sheet_to_json(ws, { defval: '', raw: true });

                    if (rows.length === 0) {
                        statusEl.textContent = 'No rows found in file.';
                        statusEl.className = 'mt-2 text-[10px] text-center font-bold text-red-400';
                        return;
                    }

                    const ts = Date.now();
                    const newSchedule = {};
                    let rowCount = 0;

                    rows.forEach((row, i) => {
                        const fin = String(row['FIN'] || '').trim().toUpperCase();
                        if (!fin) return;

                        const rotation = {
                            idt:     row['IDT']   || '',
                            iflt:    String(row['IFLT']  || '').trim(),
                            inGt:    String(row['InGt']  || '').trim(),
                            iStn:    String(row['ISTN']  || '').trim(),
                            stn:     String(row['STN']   || '').trim(),
                            oStn:    String(row['OSTN']  || '').trim(),
                            oGt:     String(row['OGT']   || '').trim(),
                            oflt:    String(row['OFLT']  || '').trim(),
                            odt:     row['ODT']   || '',
                            routeDt: row['RouteDt'] || '',
                            _ts: ts
                        };

                        if (!newSchedule[fin]) newSchedule[fin] = [];
                        newSchedule[fin].push(rotation);
                        rowCount++;
                    });

                    // Sort each FIN's rotations by outbound time
                    Object.keys(newSchedule).forEach(fin => {
                        newSchedule[fin].sort((a, b) => {
                            const ta = a.odt ? new Date(a.odt).getTime() : 0;
                            const tb = b.odt ? new Date(b.odt).getTime() : 0;
                            return ta - tb;
                        });
                    });

                    scheduleData = newSchedule;
                    saveScheduleData();

                    // Broadcast to all peers
                    const peers = Object.keys(p2pConnections);
                    peers.forEach(pid => conn_p2p_send(pid, { type: 'FULL_SYNC', finTable, assetIndex, nroIndex, scheduleData }));

                    const finCount = Object.keys(newSchedule).length;
                    statusEl.textContent = `✓ ${rowCount} rotations across ${finCount} aircraft imported.`;
                    statusEl.className = 'mt-2 text-[10px] text-center font-bold text-emerald-500';
                    renderRefList();
                    showToast(`Schedule: ${finCount} aircraft, ${rowCount} rotations`);
                } catch(err) {
                    console.error(err);
                    statusEl.textContent = 'Error: ' + err.message;
                    statusEl.className = 'mt-2 text-[10px] text-center font-bold text-red-400';
                }
            };
            reader.readAsArrayBuffer(file);
        }

        // Parse a CSV string into an array of row objects keyed by CSV_HEADERS
        function parseHistoryCSV(text) {
            // Strip BOM if present
            const clean = text.replace(/^\uFEFF/, '');
            const lines = clean.split(/\r?\n/).filter(l => l.trim());
            if (lines.length < 2) return [];

            // Parse a single CSV line respecting quoted fields
            function parseLine(line) {
                const fields = [];
                let cur = '', inQ = false;
                for (let i = 0; i < line.length; i++) {
                    const ch = line[i];
                    if (inQ) {
                        if (ch === '"' && line[i+1] === '"') { cur += '"'; i++; }
                        else if (ch === '"') { inQ = false; }
                        else { cur += ch; }
                    } else {
                        if (ch === '"') { inQ = true; }
                        else if (ch === ',') { fields.push(cur); cur = ''; }
                        else { cur += ch; }
                    }
                }
                fields.push(cur);
                return fields;
            }

            const headers = parseLine(lines[0]);
            const rows = [];
            for (let i = 1; i < lines.length; i++) {
                const vals = parseLine(lines[i]);
                const obj = {};
                headers.forEach((h, idx) => { obj[h.trim()] = (vals[idx] || '').trim(); });
                rows.push(obj);
            }
            return rows;
        }

        // Convert a parsed row into an entry object and feed it through updateFinTable
        function applyHistoryRows(rows, statusEl) {
            let processed = 0, skipped = 0;

            rows.forEach((row, idx) => {
                const fin = (row['FIN'] || '').trim().toUpperCase();
                if (!fin || fin === 'INV' || !/^(AC|RV|QK)\d{3,4}$/.test(fin)) { skipped++; return; }

                // Build a timestamp from "Service Date" — fall back to index so ordering is preserved
                let ts = 0;
                const dateStr = row['Service Date'] || row['displayDate'] || '';
                if (dateStr) {
                    const d = new Date(dateStr);
                    ts = isNaN(d) ? 0 : d.getTime();
                }
                // Use index as tie-breaker so row order is respected within same date
                if (!ts) ts = idx + 1;

                const entry = {
                    id:             ts + idx,   // unique enough per row
                    FIN:            fin,
                    'Flight#':      row['Flight#']          || '',
                    displayDate:    row['Service Date']     || row['displayDate'] || dateStr,
                    displayTime:    row['Arrival Time']     || row['displayTime'] || '',
                    'Service Station': row['Service Station'] || '',
                    Agent:          row['Agent']            || '',
                    Priority:       row['Priority']         || '1',
                    Serviced:       row['Serviced']         || '',
                    Case1:          row['Case1']            || '',
                    HHD1:           row['HHD1']             || '',
                    HHD2:           row['HHD2']             || '',
                    Case2:          row['Case2']            || '',
                    HHD3:           row['HHD3']             || '',
                    HHD4:           row['HHD4']             || '',
                    HD1Rmvd:        row['HD1Rmvd']          || '',
                    HD2Rmvd:        row['HD2Rmvd']          || '',
                    HD3Rmvd:        row['HD3Rmvd']          || '',
                    HD4Rmvd:        row['HD4Rmvd']          || '',
                    ASST:           row['ASST']             || '',
                    Battery:        row['Battery']          || '',
                    Rolls:          row['Rolls']            || '',
                    SrvcIssCAT:     row['SrvcIssCAT']       || '',
                    SrvcIss:        row['SrvcIss']          || '',
                    IssueDetails:   row['Comments']         || '',
                };

                updateFinTable(entry);
                processed++;
            });

            // Refresh the sync table view
            renderRefList();
            renderPriorityList();

            const msg = `✓ ${processed} entries processed` + (skipped > 0 ? ` · ${skipped} skipped` : '');
            if (statusEl) statusEl.textContent = msg;
            showToast(`Sync table rebuilt — ${processed} entries`);
        }
