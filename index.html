<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Service Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.875rem; font-weight: 600; color: #374151; margin-bottom: 0.25rem; }
        .sub-label { font-size: 0.75rem; color: #6b7280; margin-bottom: 0.1rem; }
        input, select, textarea { 
            width: 100%; 
            padding: 0.625rem; 
            border: 1px solid #d1d5db; 
            border-radius: 0.5rem; 
            background-color: #ffffff;
            font-size: 1rem;
            transition: all 0.2s;
            -webkit-appearance: none;
            appearance: none;
        }
        select {
            -webkit-appearance: listbox;
            appearance: auto;
        }
        input:focus, select:focus, textarea:focus { 
            border-color: #3b82f6; 
            outline: none; 
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); 
            background-color: #fff;
        }
        /* Validation Styling */
        input.invalid-asset {
            border-color: #ef4444 !important;
            background-color: #fef2f2 !important;
            color: #b91c1c !important;
        }
        
        .tab-btn { position: relative; }
        .tab-btn.active { color: #3b82f6; }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 25%;
            right: 25%;
            height: 3px;
            background: #3b82f6;
            border-radius: 3px 3px 0 0;
        }
        
        .checkbox-container {
            display: flex;
            align-items: center;
            height: 42px;
        }
        .checkbox-container input {
            width: 1.25rem;
            height: 1.25rem;
            margin-right: 0.5rem;
            cursor: pointer;
            -webkit-appearance: checkbox;
            appearance: checkbox;
        }

        #editor-modal { display: none; }
        #editor-modal.open { display: flex; }

        @keyframes pulse-sync {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .sync-dot-online { background-color: #10b981 !important; box-shadow: 0 0 6px #10b981; }
        .sync-dot-syncing { background-color: #3b82f6 !important; animation: pulse-sync 0.8s ease-in-out infinite; }
        .sync-dot-offline { background-color: #475569 !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <header class="bg-slate-900 text-white p-4 shadow-lg sticky top-0 z-30">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center font-bold text-lg">A</div>
                <h1 class="text-xl font-bold tracking-tight">Service Report</h1>
            </div>
            <button id="export-btn" onclick="exportToCSV()" class="bg-emerald-500 hover:bg-emerald-600 px-4 py-2 rounded-lg text-sm font-bold transition-all shadow-md active:scale-95 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                Export CSV
            </button>
            <button id="email-btn" onclick="emailCSV()" class="bg-blue-500 hover:bg-blue-600 px-4 py-2 rounded-lg text-sm font-bold transition-all shadow-md active:scale-95 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                </svg>
                Email
            </button>
            <div id="sync-status" title="P2P Sync Status" class="flex items-center gap-1.5 px-3 py-2 rounded-lg bg-slate-800 border border-slate-700 text-xs font-bold font-mono cursor-default select-none">
                <span id="sync-dot" class="w-2 h-2 rounded-full bg-slate-600 inline-block"></span>
                <span id="sync-label" class="text-slate-500">P2P</span>
            </div>
        </div>
    </header>

    <nav class="bg-white border-b flex sticky top-[68px] z-20 shadow-sm">
        <button id="tab-form" onclick="switchTab('form')" class="tab-btn active flex-1 py-4 text-center font-bold transition-colors">NEW ENTRY</button>
        <button id="tab-records" onclick="switchTab('records')" class="tab-btn flex-1 py-4 text-center font-bold transition-colors text-slate-500">HISTORY (<span id="count">0</span>)</button>
    </nav>

    <main class="container mx-auto p-4 pb-24 max-w-2xl">
        <section id="section-form" class="space-y-4">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <form id="dataForm" onsubmit="handleSave(event)">
                    
                    <div class="flex justify-between items-center mb-6 border-b border-slate-100 pb-4">
                        <h2 id="flight-header-label" class="text-lg font-extrabold text-slate-800 uppercase tracking-wide">Flight Details</h2>
                        <button type="button" id="toggle-inventory-btn" onclick="toggleInventoryMode()" class="bg-amber-50 text-amber-700 border border-amber-200 px-3 py-1.5 rounded-lg text-[10px] font-black hover:bg-amber-100 transition-all uppercase tracking-tighter">
                            Inventory Only Mode
                        </button>
                    </div>

                    <div id="service-specific-sections" class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="form-group">
                                <label>FIN</label>
                                <input type="text" name="FIN" id="field-fin" placeholder="e.g. AC110" pattern="^(AC|RV|QK)\d{3,4}$" class="uppercase font-mono" oninput="handleFinInput(this)" required>
                                <div id="fin-reference" class="mt-1 flex gap-2 h-6">
                                    <span id="ref-type" class="text-base font-black text-blue-600 uppercase"></span>
                                    <span id="ref-body" class="text-base font-black text-slate-400 uppercase"></span>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Flight #</label>
                                <input type="text" name="Flight#" id="field-flight" placeholder="e.g. 0123" pattern="^\d{1,4}$" class="font-mono" inputmode="numeric" maxlength="4" oninput="this.value = this.value.replace(/\D/g, '').slice(0, 4)" required>
                            </div>
                        </div>

                        <div class="grid grid-cols-3 gap-4 items-end">
                            <div class="form-group">
                                <label>Serviced</label>
                                <select name="Serviced" id="serviced-field" class="font-medium">
                                    <option value="Yes" selected>Yes</option>
                                    <option value="No">No</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Priority</label>
                                <select name="Priority" id="priority-field">
                                    <option value="1" selected>1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <div class="checkbox-container">
                                    <input type="checkbox" name="ServiceCall" id="service-call-check">
                                    <label for="service-call-check" class="!mb-0 !inline cursor-pointer font-bold text-blue-600">Srvc Call</label>
                                </div>
                            </div>
                        </div>

                        <h2 class="text-sm font-black mb-4 mt-8 text-slate-400 uppercase tracking-[0.2em] border-b pb-2">Equipment</h2>
                        <div class="space-y-4">
                            <div class="bg-blue-50/40 p-4 rounded-xl border border-blue-100/50">
                                <div class="grid grid-cols-3 gap-3 mb-3">
                                    <div class="col-span-1">
                                        <label class="text-blue-700">Case 1</label>
                                        <input type="text" name="Case1" maxlength="4" placeholder="000 or Msng" class="border-blue-200 text-xs">
                                    </div>
                                    <div class="col-span-1">
                                        <label class="text-blue-700">HHD 1</label>
                                        <input type="text" name="HHD1" maxlength="7" placeholder="0000 or Msng" class="border-blue-200 text-xs asset-input" oninput="validateAssetInput(this); updateBatteryPlaceholder()">
                                    </div>
                                    <div class="col-span-1">
                                        <label class="text-blue-700">HHD 2</label>
                                        <input type="text" name="HHD2" id="field-hhd2" maxlength="7" placeholder="0000 or Msng" class="border-blue-200 text-xs asset-input" oninput="validateAssetInput(this); updateBatteryPlaceholder()">
                                    </div>
                                </div>
                                <div class="grid grid-cols-3 gap-3">
                                    <div class="col-span-1"></div>
                                    <div class="col-span-1">
                                        <div class="sub-label">HD1(Rmvd)</div>
                                        <input type="text" name="HD1Rmvd" id="hd1-rmvd" maxlength="7" placeholder="0000" class="border-blue-200 bg-white/50 text-xs asset-input" oninput="validateAssetInput(this)">
                                    </div>
                                    <div class="col-span-1">
                                        <div class="sub-label">HD2(Rmvd)</div>
                                        <input type="text" name="HD2Rmvd" id="hd2-rmvd" maxlength="7" placeholder="0000" class="border-blue-200 bg-white/50 text-xs asset-input" oninput="validateAssetInput(this)">
                                    </div>
                                </div>
                            </div>
                            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                                <div class="grid grid-cols-3 gap-3 mb-3">
                                    <div class="col-span-1">
                                        <label>Case 2</label>
                                        <input type="text" name="Case2" id="field-case2" maxlength="4" placeholder="000 or Msng" class="text-xs">
                                    </div>
                                    <div class="col-span-1">
                                        <label>HHD 3</label>
                                        <input type="text" name="HHD3" id="field-hhd3" maxlength="7" placeholder="0000 or Msng" class="text-xs asset-input" oninput="validateAssetInput(this); updateBatteryPlaceholder()">
                                    </div>
                                    <div class="col-span-1">
                                        <label>HHD 4</label>
                                        <input type="text" name="HHD4" id="field-hhd4" maxlength="7" placeholder="0000 or Msng" class="text-xs asset-input" oninput="validateAssetInput(this); updateBatteryPlaceholder()">
                                    </div>
                                </div>
                                <div class="grid grid-cols-3 gap-3">
                                    <div class="col-span-1"></div>
                                    <div class="col-span-1">
                                        <div class="sub-label">HD3(Rmvd)</div>
                                        <input type="text" name="HD3Rmvd" id="hd3-rmvd" maxlength="7" placeholder="0000" class="bg-white/50 text-xs asset-input" oninput="validateAssetInput(this)">
                                    </div>
                                    <div class="col-span-1">
                                        <div class="sub-label">HD4(Rmvd)</div>
                                        <input type="text" name="HD4Rmvd" id="hd4-rmvd" maxlength="7" placeholder="0000" class="bg-white/50 text-xs asset-input" oninput="validateAssetInput(this)">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4 mt-4">
                            <div class="form-group">
                                <label>Batteries (0-10)</label>
                                <input type="number" name="Battery" id="field-battery" min="0" max="10" placeholder="0">
                            </div>
                            <div class="form-group">
                                <label>Rolls (0-20)</label>
                                <input type="number" name="Rolls" min="0" max="20" placeholder="0">
                            </div>
                        </div>
                    </div>

                    <h2 id="issues-section-label" class="text-sm font-black mb-4 mt-8 text-slate-400 uppercase tracking-[0.2em] border-b pb-2">Service Issues</h2>
                    <div class="form-group">
                        <label>Reported Asset# (Last 4)</label>
                        <input type="text" name="ASST" maxlength="7" placeholder="e.g. 1234" class="asset-input" oninput="validateAssetInput(this)">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="form-group">
                            <label>Issue Category</label>
                            <select name="SrvcIssCAT" id="srvc-iss-cat-field" onchange="updateIssueOptions()">
                                <option value="">-- Select --</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Specific Issue</label>
                            <select name="SrvcIss" id="srvc-iss-field">
                                <option value="">-- Select Category --</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Issue Details</label>
                        <textarea name="IssueDetails" rows="2" placeholder="Describe fault..."></textarea>
                    </div>

                    <h2 class="text-sm font-black mb-4 mt-8 text-slate-400 uppercase tracking-[0.2em] border-b pb-2">Identification</h2>
                    <div class="grid grid-cols-3 gap-4">
                        <div class="form-group col-span-2">
                            <label>Agent Name</label>
                            <select name="Agent" id="agent-field" onchange="onAgentChange()" required>
                                <option value="">-- Select Agent --</option>
                                <optgroup label="YYZ - Toronto">
                                    <option value="Michael Marques ,YYZ 905 405 4198" data-station="YYZ">Michael Marques</option>
                                    <option value="Amar Atta ,YYZ 647 288 4509" data-station="YYZ">Amar Atta</option>
                                    <option value="Amritheera Malhi ,YYZ 647 288 4509" data-station="YYZ">Amritheera Malhi</option>
                                    <option value="Muqeet Alam ,YYZ 647 288 4509" data-station="YYZ">Muqeet Alam</option>
                                    <option value="Stan Beatty ,YYZ 647 825 1214" data-station="YYZ">Stan Beatty</option>
                                    <option value="Gurjinder Mann ,YYZ 647 288 4509" data-station="YYZ">Gurjinder Mann</option>
                                    <option value="Abdullah Atta ,YYZ 647 288 4509" data-station="YYZ">Abdullah Atta</option>
                                </optgroup>
                                <optgroup label="YYC - Calgary">
                                    <option value="Jeff Eng ,YYC 403 312 8555" data-station="YYC">Jeff Eng</option>
                                    <option value="Kevin Joly ,YYC 403 312 8555" data-station="YYC">Kevin Joly</option>
                                </optgroup>
                                <optgroup label="YVR - Vancouver">
                                    <option value="Kevin Brown ,YVR 604 830 0395" data-station="YVR">Kevin Brown</option>
                                    <option value="Billy Yan ,YVR 604 830 0395" data-station="YVR">Billy Yan</option>
                                </optgroup>
                                <optgroup label="YUL - Montreal">
                                    <option value="Ben Burgio ,YUL 514 977 5312" data-station="YUL">Ben Burgio</option>
                                    <option value="Jean Cham ,YUL 514 977 5312" data-station="YUL">Jean Cham</option>
                                    <option value="Joann Cortese ,YUL 514 977 5312" data-station="YUL">Joann Cortese</option>
                                    <option value="Janine Ostaco ,YUL 514 977 5312" data-station="YUL">Janine Margaret Ostaco</option>
                                </optgroup>
                            </select>
                        </div>
                        <div class="form-group col-span-1">
                            <label>Station</label>
                            <select name="Service Station" id="station-field" required>
                                <option value="">--</option>
                                <option value="YUL">YUL</option>
                                <option value="YYZ">YYZ</option>
                                <option value="YYC">YYC</option>
                                <option value="YVR">YVR</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>General Comments</label>
                        <textarea name="GeneralComments" rows="2" placeholder="Overall notes..."></textarea>
                    </div>

                    <div class="hidden">
                        <input type="hidden" name="Case3" value="NtRqrd">
                        <input type="hidden" name="HHD5" value="NtRqrd">
                        <input type="hidden" name="HHD6" value="NtRqrd">
                        <input type="hidden" name="HD5Rmvd" value="">
                        <input type="hidden" name="HD6Rmvd" value="">
                    </div>

                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl shadow-xl active:scale-95 transition-all mt-6 uppercase tracking-widest text-lg">
                        SAVE RECORD
                    </button>
                </form>

                <div class="mt-8 pt-4 border-t border-slate-100 flex justify-center items-center gap-2 opacity-40 hover:opacity-100 transition-opacity">
                    <span class="text-[9px] font-black uppercase tracking-[0.2em] text-slate-500">Proprietary System &copy; Michael Marques</span>
                    <div class="w-1 h-1 bg-slate-300 rounded-full"></div>
                    <button onclick="openRefEditor()" class="text-[9px] font-bold text-slate-400 hover:text-blue-500 transition-colors" id="app-version-label"></button>
                </div>
            </div>
        </section>

        <section id="section-records" class="hidden space-y-4">
            <div id="no-records" class="text-center py-16 bg-white rounded-2xl border-2 border-dashed border-slate-200 text-slate-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto mb-4 opacity-20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <p class="font-bold">No records found</p>
            </div>
            <div id="records-list" class="space-y-4"></div>
        </section>
    </main>

    <div id="editor-modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-4 bg-slate-100 border-b flex justify-between items-center">
                <h3 class="font-black text-slate-800 uppercase tracking-tight">System Ref Editor</h3>
                <button onclick="closeRefEditor()" class="text-slate-400 hover:text-slate-600">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            
            <div class="flex border-b text-[10px] font-black uppercase tracking-widest bg-slate-50">
                <button onclick="switchRefTab('aircraft')" id="ref-tab-aircraft" class="flex-1 py-3 border-b-2 border-blue-600 text-blue-600">Aircraft</button>
                <button onclick="switchRefTab('assets')" id="ref-tab-assets" class="flex-1 py-3 border-b-2 border-transparent text-slate-400">Asset Database</button>
                <button onclick="switchRefTab('synctable')" id="ref-tab-synctable" class="flex-1 py-3 border-b-2 border-transparent text-slate-400">Sync Table</button>
            </div>

            <div class="p-4 overflow-y-auto flex-1 space-y-4" id="ref-editor-list"></div>
            
            <div class="p-4 bg-slate-50 border-t flex gap-2" id="add-aircraft-ui">
                <input type="text" id="new-ref-prefix" placeholder="Prefix" class="w-24 uppercase font-mono !text-xs">
                <input type="text" id="new-ref-type" placeholder="Type" class="flex-1 !text-xs">
                <select id="new-ref-body" class="w-16 !text-xs">
                    <option value="NB">NB</option>
                    <option value="WB">WB</option>
                </select>
                <button onclick="addNewRef()" class="bg-blue-600 text-white px-3 py-1 rounded-lg text-xs font-bold">+</button>
            </div>

            <div class="p-4 bg-slate-50 border-t flex gap-2 hidden" id="add-asset-ui">
                <input type="text" id="new-asset-id" placeholder="Asset#" class="w-24 uppercase font-mono !text-xs">
                <input type="text" id="new-asset-name" placeholder="Item Name" class="flex-1 !text-xs">
                <button onclick="addNewAsset()" class="bg-emerald-600 text-white px-3 py-1 rounded-lg text-xs font-bold">+</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-3 rounded-full opacity-0 pointer-events-none transition-all duration-300 shadow-2xl z-50 font-bold border border-slate-700">
        Record Saved!
    </div>

    <script>
        // Updated Version Number
        const CURRENT_VERSION = "v2.2.9";

        const DEFAULT_AIRCRAFT_REF = {
            "AC10": { type: "A220", body: "NB" }, "AC11": { type: "A220", body: "NB" }, "AC12": { type: "A220", body: "NB" },

            "AC84": { type: "787-9", body: "WB" }, "AC85": { type: "787-9", body: "WB" }, "AC86": { type: "787-9", body: "WB" }, 
            "AC87": { type: "787-10", body: "WB" }, "AC88": { type: "787-10", body: "WB" }, "AC89": { type: "787-10", body: "WB" },

        function saveFinTable() {
            try { localStorage.setItem(SYNC_TABLE_KEY, JSON.stringify(finTable)); } catch(e) { console.warn('Could not save FIN table:', e); }
        }

        function updateFinTable(entry) {
            if (!entry || entry.FIN === 'INV') return;
            const fin = entry.FIN;
            if (!finTable[fin]) {
                finTable[fin] = { type: '', body: '', assets: [], lastSeen: '', lastFlight: '', _ts: 0 };
            }
            // Resolve aircraft type
            const match = aircraftRef[fin.substring(0,4)] || aircraftRef[fin.substring(0,2)];
            if (match) { finTable[fin].type = match.type; finTable[fin].body = match.body; }
            // Merge assets — add any new ones not already present
            const existing = new Set(finTable[fin].assets);
            [entry.HHD1, entry.HHD2, entry.HHD3, entry.HHD4].forEach(a => {
                if (a && a !== 'N/A' && a !== 'NtRqrd' && a !== 'Msng' && a !== '' && !existing.has(a)) {
                    finTable[fin].assets.push(a);
                    existing.add(a);
                }
            });
            // Update last seen — keep the most recent by timestamp
            const entryTs = entry.id || 0;
            if (entryTs >= (finTable[fin]._ts || 0)) {
                finTable[fin].lastSeen   = entry.displayDate || '';
                finTable[fin].lastFlight = entry['Flight#']  || '';
                finTable[fin]._ts        = entryTs;
            }
            saveFinTable();
        }

        function isValidAssetId(val) {
            if (!val || val.trim() === "") return true;
            const normalized = val.trim().toLowerCase();
            if (["msng", "ntrqrd", "n/a", "rmvd"].includes(normalized)) return true;
            const num = val.replace(/\D/g, '');
            if (num === "") return false; // letters-only input is invalid
            const padded = num.padStart(4, '0');
            return !!assetRef[num] || !!assetRef[padded];
        }

        function validateAssetInput(el) {
            if (!isValidAssetId(el.value)) {
                el.classList.add('invalid-asset');
            } else {
                el.classList.remove('invalid-asset');

        function renderSyncTable(container) {
            const fins = Object.keys(finTable).sort();

            if (fins.length === 0) {
                container.innerHTML = `<div class="text-center py-8 text-slate-400 text-xs font-bold uppercase tracking-widest">No records saved yet</div>`;
                return;
            }

            // Header row
            const header = document.createElement('div');
            header.className = "grid grid-cols-12 gap-1 px-2 py-1 text-[9px] font-black uppercase tracking-widest text-slate-400 border-b border-slate-200 sticky top-0 bg-white";
            header.innerHTML = `
                <span class="col-span-2">FIN</span>
                <span class="col-span-3">Type</span>
                <span class="col-span-5">Assets on FIN</span>
                <span class="col-span-2">Last</span>`;
            container.appendChild(header);

            fins.forEach(fin => {
                const entry = finTable[fin];
                const assetList = (entry.assets || []).join(', ') || '—';
                const bodyColor = entry.body === 'WB' ? 'text-purple-600' : 'text-slate-400';
                const div = document.createElement('div');
                div.className = "grid grid-cols-12 gap-1 px-2 py-2 text-[10px] border-b border-slate-100 hover:bg-slate-50 items-start";
                div.innerHTML = `

            footer.textContent = `${fins.length} aircraft · ${db.filter(r => r.FIN !== 'INV').length} service entries`;
            container.appendChild(footer);

        function addNewRef() {
            const prefix = document.getElementById('new-ref-prefix').value.trim().toUpperCase();

            if (!prefix || !type) return showToast("Enter Prefix & Type");
            aircraftRef[prefix] = { type, body };
            try { localStorage.setItem(REF_STORAGE_KEY, JSON.stringify(aircraftRef)); } catch(e) { showToast("Storage full!"); }
            renderRefList();
            document.getElementById('new-ref-prefix').value = '';
            document.getElementById('new-ref-type').value = '';
            showToast("Added Aircraft Ref");

        function removeRef(prefix) {
            delete aircraftRef[prefix];
            try { localStorage.setItem(REF_STORAGE_KEY, JSON.stringify(aircraftRef)); } catch(e) { showToast("Storage full!"); }
            renderRefList();
            showToast("Removed");

        function addNewAsset() {

            assetRef[id] = name;

        function getBodyType(fin) {
            if (!fin) return "NB";
            let match = aircraftRef[fin.substring(0,4)] || aircraftRef[fin.substring(0,2)];
            return match ? match.body : "NB";
        }

        function handleFinInput(el) {
            el.value = el.value.toUpperCase();
            const val = el.value;
            const refType = document.getElementById('ref-type');
            const refBody = document.getElementById('ref-body');
            refType.textContent = "";
            refBody.textContent = "";

            const case2  = document.getElementById('field-case2');
            const hhd2   = document.getElementById('field-hhd2');
            const hhd3   = document.getElementById('field-hhd3');
            const hhd4   = document.getElementById('field-hhd4');

            // Reset placeholders to default
            case2.placeholder = "000 or Msng";
            hhd2.placeholder  = "0000 or Msng";
            hhd3.placeholder  = "0000 or Msng";
            hhd4.placeholder  = "0000 or Msng";

            if (val.length >= 2) {
                let match = aircraftRef[val.substring(0,4)] || aircraftRef[val.substring(0,2)];
                if (match) {
                    refType.textContent = match.type;
                    refBody.textContent = match.body;
                    refBody.className = match.body === "WB" ? "text-base font-black text-purple-600 uppercase" : "text-base font-black text-slate-400 uppercase";

                    const isNB = match.body === "NB";
                    const isQK = val.startsWith("QK");

                    if (isNB) {
                        case2.placeholder = "NtRqrd";
                        hhd3.placeholder  = "NtRqrd";
                        hhd4.placeholder  = "NtRqrd";
                    }
                    if (isQK) {
                        hhd2.placeholder = "NtRqrd";
                    }
                }
            }
        }

        function updateBatteryPlaceholder() {
            const hasHHD = (id) => {
                const el = document.querySelector(`[name="${id}"]`);
                const val = el ? el.value.trim().toLowerCase() : "";
                return val !== "" && val !== "msng" && val !== "ntrqrd" && val !== "n/a";
            };

            const h1 = hasHHD('HHD1'), h2 = hasHHD('HHD2');
            const h3 = hasHHD('HHD3'), h4 = hasHHD('HHD4');

            // +1 per HHD entered
            let count = [h1, h2, h3, h4].filter(Boolean).length;
            // +1 if case 1 has any HHD (HHD1 or HHD2)
            if (h1 || h2) count++;
            // +1 if case 2 has any HHD (HHD3 or HHD4)
            if (h3 || h4) count++;

            const batteryField = document.getElementById('field-battery');
            batteryField.placeholder = count > 0 ? String(count) : "0";
        }

        function toggleInventoryMode() { isInventoryOnlyMode = !isInventoryOnlyMode; applyModeUI(); }
        function applyModeUI() {
            const btn = document.getElementById('toggle-inventory-btn');
            const flightHeader = document.getElementById('flight-header-label');
            const serviceSections = document.getElementById('service-specific-sections');
            const issuesLabel = document.getElementById('issues-section-label');
            const finField = document.getElementById('field-fin');
            const flightField = document.getElementById('field-flight');
            const refArea = document.getElementById('fin-reference');

            if (isInventoryOnlyMode) {
                btn.textContent = "Back to Full Service";
                flightHeader.textContent = "Inventory Entry";
                serviceSections.classList.add('hidden');
                issuesLabel.textContent = "Record Movement";
                finField.removeAttribute('required');
                flightField.removeAttribute('required');
                refArea.classList.add('invisible');
            } else {
                btn.textContent = "Inventory Only Mode";
                flightHeader.textContent = "Flight Details";
                serviceSections.classList.remove('hidden');
                issuesLabel.textContent = "Service Issues";
                finField.setAttribute('required', '');
                flightField.setAttribute('required', '');
                refArea.classList.remove('invisible');
            }
            updateCategoryOptions();
        }

        function updateCategoryOptions() {
            const catField = document.getElementById('srvc-iss-cat-field');
            catField.innerHTML = '<option value="">-- Select --</option>';
            Object.keys(issueMap).forEach(cat => {
                const lower = cat.toLowerCase();
                const isMovement = lower.includes("rt (") || lower.includes("rm (");
                const isFound = lower.includes("found");
                if (isInventoryOnlyMode) {
                    if (isFound || isMovement) {
                        const opt = document.createElement('option');
                        opt.value = cat; opt.textContent = cat;
                        catField.appendChild(opt);
                    }
                } else {
                    if (!isMovement) {
                        const opt = document.createElement('option');
                        opt.value = cat; opt.textContent = cat;
                        catField.appendChild(opt);
                    }
                }
            });
            updateIssueOptions();
        }

        function updateIssueOptions() {
            const catField = document.getElementById('srvc-iss-cat-field');
            const issField = document.getElementById('srvc-iss-field');
            const selectedCat = catField.value;
            issField.innerHTML = '';
            if (!selectedCat) {
                issField.innerHTML = '<option value="">-- Select Category --</option>';
                return;
            }
            let issues = [...(issueMap[selectedCat] || [])];
            const isFoundCat = selectedCat.toLowerCase().includes("found");
            if (isFoundCat) {
                if (isInventoryOnlyMode) {
                    issues = issues.filter(i => i !== "HHD Found Onboard Aircraft");
                } else {
                    issues = issues.filter(i => i === "HHD Found Onboard Aircraft");
                }
            }
            issField.innerHTML = '<option value="">-- Select Specific --</option>';
            issues.forEach(issue => {
                const opt = document.createElement('option');
                opt.value = issue; opt.textContent = issue;
                issField.appendChild(opt);
            });
        }

        function onAgentChange() {
            const agentField = document.getElementById('agent-field');
            const stationField = document.getElementById('station-field');
            const station = agentField.options[agentField.selectedIndex]?.getAttribute('data-station');
            if (station) stationField.value = station;
            sessionStorage.setItem(AGENT_KEY, agentField.value);
            sessionStorage.setItem(STATION_KEY, stationField.value);
            // Kick off P2P whenever agent is selected
            if (agentField.value) initP2P(agentField.value);
        }

        function restoreAgent() {
            const savedAgent = sessionStorage.getItem(AGENT_KEY);
            const savedStation = sessionStorage.getItem(STATION_KEY);
            if (savedAgent) document.getElementById('agent-field').value = savedAgent;
            if (savedStation) document.getElementById('station-field').value = savedStation;
            // Auto-connect on restore
            if (savedAgent) initP2P(savedAgent);
        }

        function formatGGCId(val, isRemovalField = false) {
            if (!val || val.trim() === "" || val.toLowerCase().includes("ntrqrd") || val.toLowerCase().includes("n/a")) return val || "";
            if (!isRemovalField) {
                if (val.trim().toLowerCase() === "rmvd" || val.trim().toLowerCase() === "msng") return val.charAt(0).toUpperCase() + val.slice(1).toLowerCase();
            }
            let num = val.replace(/\D/g, '');
            if (num === "") return val.toUpperCase(); 
            return "GGC" + num.padStart(4, '0');
        }

        function formatCaseId(val) {
            if (!val || val.trim() === "" || val.toLowerCase().includes("ntrqrd") || val.toLowerCase().includes("n/a")) return val || "";
            if (val.trim().toLowerCase() === "rmvd" || val.trim().toLowerCase() === "msng") return val.charAt(0).toUpperCase() + val.slice(1).toLowerCase();
            let num = val.replace(/\D/g, '');
            if (num === "") return val.toUpperCase();
            return num.padStart(3, '0');
        }

        function handleSave(event) {
            event.preventDefault();
            const form = event.target;
            const formData = new FormData(form);
            const entry = Object.fromEntries(formData.entries());
            const now = new Date();
            const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
            const isInvMode = isInventoryOnlyMode || (entry.FIN && entry.FIN.toUpperCase() === "INV");

            if (!entry.Agent || entry.Agent.trim() === "") {
                showToast("Please select your Agent name!");
                document.getElementById('agent-field').focus();
                return;
            }

            entry.Rv = CURRENT_VERSION;

            // Auto-format Flight#: prepend first 2 chars of FIN + zero-pad to 4 digits
            if (!isInventoryOnlyMode && entry['Flight#'] && entry.FIN) {
                const prefix = entry.FIN.substring(0, 2).toUpperCase();
                const digits = entry['Flight#'].replace(/\D/g, '').padStart(4, '0');
                entry['Flight#'] = prefix + digits;
            }

            let invalidAssetsFound = [];
            const assetFieldsToCheck = ['HHD1', 'HHD2', 'HHD3', 'HHD4', 'HD1Rmvd', 'HD2Rmvd', 'HD3Rmvd', 'HD4Rmvd', 'ASST'];
            assetFieldsToCheck.forEach(field => {
                const val = entry[field];
                if (val && !isValidAssetId(val)) invalidAssetsFound.push(val);
            });

            if (!isInvMode) {
                const bodyType = getBodyType(entry.FIN);
                const isQK = entry.FIN.toUpperCase().startsWith("QK");
                let missingDetected = false;
                if (!entry.Case1 || entry.Case1.trim() === "") { entry.Case1 = "Msng"; missingDetected = true; }
                else entry.Case1 = formatCaseId(entry.Case1);
                if (!entry.HHD1 || entry.HHD1.trim() === "") { entry.HHD1 = "Msng"; missingDetected = true; }
                else entry.HHD1 = formatGGCId(entry.HHD1);
                if (!entry.HHD2 || entry.HHD2.trim() === "") {
                    if (isQK) { entry.HHD2 = "NtRqrd"; }
                    else { entry.HHD2 = "Msng"; missingDetected = true; }
                } else entry.HHD2 = formatGGCId(entry.HHD2);
                if (!entry.Case2 || entry.Case2.trim() === "") {
                    if (bodyType === "NB") { entry.Case2 = "NtRqrd"; }
                    else { entry.Case2 = "Msng"; missingDetected = true; }
                } else entry.Case2 = formatCaseId(entry.Case2);
                if (!entry.HHD3 || entry.HHD3.trim() === "") {
                    if (bodyType === "NB") { entry.HHD3 = "NtRqrd"; }
                    else { entry.HHD3 = "Msng"; missingDetected = true; }
                } else entry.HHD3 = formatGGCId(entry.HHD3);
                if (!entry.HHD4 || entry.HHD4.trim() === "") {
                    if (bodyType === "NB") { entry.HHD4 = "NtRqrd"; }
                    else { entry.HHD4 = "Msng"; missingDetected = true; }
                } else entry.HHD4 = formatGGCId(entry.HHD4);
                if (missingDetected && (!entry.SrvcIssCAT || entry.SrvcIssCAT === "")) {
                    entry.SrvcIssCAT = "Missing"; entry.SrvcIss = "HHD From Aircraft";
                }
                ['HD1Rmvd', 'HD2Rmvd', 'HD3Rmvd', 'HD4Rmvd'].forEach(f => entry[f] = formatGGCId(entry[f], true));
            } else {
                entry.FIN = "INV"; entry['Flight#'] = ""; entry.Serviced = "Yes"; 
                entry.Case1 = "N/A"; entry.Case2 = "N/A"; entry.Case3 = "N/A";
                entry.HHD1 = "N/A"; entry.HHD2 = "N/A"; entry.HHD3 = "N/A";
                entry.HHD4 = "N/A"; entry.HHD5 = "N/A"; entry.HHD6 = "N/A";
            }

            if (entry.ASST) entry.ASST = formatGGCId(entry.ASST);
            if (!entry.SrvcIssCAT || entry.SrvcIssCAT.trim() === "") entry.SrvcIssCAT = "---";
            if (!entry.SrvcIss || entry.SrvcIss.trim() === "") entry.SrvcIss = "---";
            
            entry.id = Date.now() + Math.floor(Math.random() * 1000);
            entry.displayDate = now.toLocaleDateString();
            entry.displayTime = timeStr;

            const buildComments = (rec) => {
                let parts = [];
                if (isInvMode) parts.push("[INV]");
                if (form.elements['ServiceCall']?.checked) parts.push("Service Call");
                if (rec.ASST) {
                    const rawId = rec.ASST.replace(/\D/g, '');
                    const assetType = assetRef[rawId] || assetRef[rawId.padStart(4, '0')];
                    if (assetType) parts.push(`Type: ${assetType}`);
                }
                if (rec.SrvcIssCAT !== "---") parts.push(`${rec.SrvcIssCAT}: ${rec.SrvcIss}`);
                if (rec.IssueDetails) parts.push(`Iss: ${rec.IssueDetails}`);
                if (rec.GeneralComments) parts.push(rec.GeneralComments);
                if (invalidAssetsFound.length > 0) {
                    invalidAssetsFound.forEach(val => {
                        const digits = val.replace(/\D/g, '').padStart(4, '0');
                        parts.push(`GGC${digits} Doesn't Exist`);
                    });
                }
                return parts.join(" | ");
            };

            entry.Comments = buildComments(entry);
            db.unshift(entry);
            broadcastNewEntry(entry);
            updateFinTable(entry);

            if (!isInvMode) {
                const removals = [{f: 'HD1Rmvd', p: 'HHD1'}, {f: 'HD2Rmvd', p: 'HHD2'}, {f: 'HD3Rmvd', p: 'HHD3'}, {f: 'HD4Rmvd', p: 'HHD4'}];
                removals.forEach((r, idx) => {
                    const removedId = entry[r.f];
                    const boardedId = entry[r.p];
                    if (removedId && removedId.trim() !== "" && !removedId.toLowerCase().includes("ntrqrd") && !removedId.toLowerCase().includes("n/a")) {
                        db.unshift({
                            id: Date.now() + Math.floor(Math.random() * 1000) + (idx + 1), FIN: "INV", 'Flight#': entry['Flight#'] || "", displayDate: entry.displayDate, displayTime: timeStr,
                            Priority: "1", Serviced: "Yes", Case1: "N/A", Case2: "N/A", Case3: "N/A", HHD1: "N/A", HHD2: "N/A",
                            HHD3: "N/A", HHD4: "N/A", HHD5: "N/A", HHD6: "N/A", Battery: "", Rolls: "", ASST: removedId,
                            SrvcIssCAT: "RM ( INV REM Base )", SrvcIss: "For Use In Service",
                            'Service Station': entry['Service Station'], Agent: entry.Agent, Rv: CURRENT_VERSION,
                            Comments: `${removedId} Swp Wth ${boardedId} On Fin ${entry.FIN}${!isValidAssetId(removedId) ? ' | ' + removedId + ' Doesn\'t Exist' : ''}`
                        });
                    }
                });
            }

            try {
                localStorage.setItem(APP_STORAGE_KEY, JSON.stringify(db));
            } catch (e) {
                showToast("Save failed: storage full!");
                return;
            }
            updateUI();
            showToast("Record Saved!");
            form.reset();
            document.querySelectorAll('.asset-input').forEach(el => el.classList.remove('invalid-asset'));
            restoreAgent();
            document.getElementById('ref-type').textContent = "";
            document.getElementById('ref-body').textContent = "";
            // Reset placeholders that may have been set by handleFinInput
            document.getElementById('field-case2').placeholder = "000 or Msng";
            document.getElementById('field-hhd2').placeholder  = "0000 or Msng";
            document.getElementById('field-hhd3').placeholder  = "0000 or Msng";
            document.getElementById('field-hhd4').placeholder  = "0000 or Msng";
            document.getElementById('field-battery').placeholder = "0";
            if (isInventoryOnlyMode) applyModeUI();
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function exportToCSV() {
            if (db.length === 0) return showToast("No records");
            const headers = ["FIN", "Flight#", "Arrival Time", "Priority", "Serviced", "Case1", "HHD1", "HHD2", "Case2", "HHD3", "HHD4", "Case3", "HHD5", "HHD6", "Battery", "Rolls", "SrvcIssCAT", "SrvcIss", "Comments", "Service Date", "Service Station", "Agent", "Rv", "ASST", "HD1Rmvd", "HD2Rmvd", "HD3Rmvd", "HD4Rmvd", "HD5Rmvd", "HD6Rmvd"];
            const escapeCSV = (v) => v === undefined || v === null ? '""' : `"${String(v).replace(/"/g, '""')}"`;
            const csvRows = [headers.join(",")];
            db.forEach(r => {
                csvRows.push(headers.map(h => {
                    let v = r[h] !== undefined ? r[h] : "";
                    if (h === "Arrival Time") v = r.displayTime;
                    if (h === "Service Date") v = r.displayDate;
                    if (h === "Rv") v = CURRENT_VERSION; 
                    return escapeCSV(v);
                }).join(","));
            });
            const blob = new Blob(["\uFEFF" + csvRows.join("\n")], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            const agentVal = document.getElementById('agent-field').value;
            const station = document.getElementById('station-field').value || "NA";
            const dateStr = new Date().toISOString().split('T')[0];

            const foundLines = foundRecords.map(formatLine);

            const serviceCallLines = db
                .filter(r => r.Comments && r.Comments.includes("Service Call") && r.FIN !== 'INV')

            const servicedCount = db.filter(r => r.FIN !== 'INV').length;

            const body = encodeURIComponent(

        }
        // ─── P2P SYNC ENGINE ─────────────────────────────────────────────────

        // All known agents — IDs are derived deterministically from their name
        const ALL_AGENTS = [
            "Michael Marques", "Amar Atta", "Amritheera Malhi", "Muqeet Alam",
            "Stan Beatty", "Gurjinder Mann", "Abdullah Atta",
            "Jeff Eng", "Kevin Joly",
            "Kevin Brown", "Billy Yan",
            "Ben Burgio", "Jean Cham", "Joann Cortese", "Janine Margaret Ostaco"
        ];

        let p2pPeer = null;
        let p2pConnections = {};      // peerId → DataConnection
        let p2pMyId = null;
        let p2pOfflineQueue = [];     // { entry } objects to broadcast when reconnected
        let p2pReady = false;
        let p2pSyncInterval = null;

        const P2P_QUEUE_KEY = 'p2p_offline_queue_v1';

        // Derive a short stable peer ID from an agent name
        // e.g. "Michael Marques" → "ggcsync-michael-marques"
        function agentToPeerId(agentValue) {
            // agentValue is the full option value e.g. "Michael Marques ,YYZ 905 405 4198"
            const name = agentValue.split(',')[0].trim().toLowerCase().replace(/\s+/g, '-');
            return `ggcsync-${name}`;
        }

        function initP2P(agentValue) {
            if (!agentValue) return;
            const peerId = agentToPeerId(agentValue);

            // Already running with this ID — no need to reinit
            if (p2pPeer && p2pMyId === peerId && !p2pPeer.destroyed) return;

            // Destroy any existing peer before reinitialising
            if (p2pPeer && !p2pPeer.destroyed) p2pPeer.destroy();
            if (p2pSyncInterval) { clearInterval(p2pSyncInterval); p2pSyncInterval = null; }
            p2pPeer = null;
            p2pConnections = {};
            p2pReady = false;
            p2pMyId = peerId;

            setSyncStatus('connecting');

            try {
                const savedQueue = localStorage.getItem(P2P_QUEUE_KEY);
                if (savedQueue) p2pOfflineQueue = JSON.parse(savedQueue);
            } catch(e) {}

            p2pPeer = new Peer(peerId, {
                debug: 0,
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ]
                }
            });

            p2pPeer.on('open', (id) => {
                p2pReady = true;
                setSyncStatus('online', 0);
                // Attempt connections to all other known agents
                connectToAllPeers(agentValue);
                // Start 5-minute background sync pulse
                startPeriodicSync(agentValue);
            });

            // Accept incoming connections from other agents
            p2pPeer.on('connection', (conn) => {
                setupP2PConnection(conn);
            });

            p2pPeer.on('disconnected', () => {
                p2pReady = false;
                setSyncStatus('offline');
                // Auto-reconnect to signaling server
                setTimeout(() => {
                    if (p2pPeer && !p2pPeer.destroyed) p2pPeer.reconnect();
                }, 4000);
            });

            p2pPeer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    // Our saved ID is taken — clear it and connect as a listener only
                    // The other instance will handle outgoing connections
                    setSyncStatus('offline');
                    console.warn('P2P: peer ID unavailable, waiting for incoming connections only');
                }
            });
        }

        function connectToAllPeers(myAgentValue) {
            const myPeerId = agentToPeerId(myAgentValue);
            ALL_AGENTS.forEach(name => {
                const theirId = `ggcsync-${name.toLowerCase().replace(/\s+/g, '-')}`;
                if (theirId === myPeerId) return;              // skip self
                if (p2pConnections[theirId]) return;           // already connected
                attemptConnect(theirId);
            });
        }

        function attemptConnect(theirId, retries = 0) {
            if (!p2pPeer || !p2pReady || p2pConnections[theirId]) return;
            const conn = p2pPeer.connect(theirId, { reliable: true });
            setupP2PConnection(conn);
        }

        function setupP2PConnection(conn) {
            // Register data/close/error handlers immediately regardless of open state
            conn.on('data', (msg) => handleP2PMessage(msg, conn.peer));

            conn.on('close', () => {
                delete p2pConnections[conn.peer];
                updateSyncCount();
                setTimeout(() => attemptConnect(conn.peer), 20000);
            });

            conn.on('error', () => {
                delete p2pConnections[conn.peer];
                updateSyncCount();
            });

            const doSync = () => {
                p2pConnections[conn.peer] = conn;
                updateSyncCount();
                const localDb = JSON.parse(localStorage.getItem(APP_STORAGE_KEY) || '[]');
                conn.send({ type: 'FULL_SYNC', db: localDb, finTable });
                flushP2PQueue();
            };

            // If already open (incoming connection), sync immediately
            // Otherwise wait for the open event (outgoing connection)
            if (conn.open) {
                doSync();
            } else {
                conn.on('open', doSync);
            }
        }

        function handleP2PMessage(msg, fromPeer) {
            if (msg.type === 'FULL_SYNC') {
                const incoming = msg.db;
                if (!Array.isArray(incoming) || incoming.length === 0) return;
                let merged = 0;
                let replaced = 0;

                incoming.forEach(inEntry => {
                    // Conflict key: same FIN + Flight# = same logical record
                    const conflictIdx = db.findIndex(r =>
                        r.FIN === inEntry.FIN &&
                        r['Flight#'] === inEntry['Flight#'] &&
                        r.FIN !== 'INV'
                    );

                    if (conflictIdx === -1) {
                        // No matching record — just add it
                        const exactMatch = db.find(r => r.id === inEntry.id);
                        if (!exactMatch) { db.unshift(inEntry); merged++; updateFinTable(inEntry); }
                    } else {
                        // Conflict — keep whichever has the later timestamp
                        const existing = db[conflictIdx];
                        const incomingTs = inEntry.id || 0;
                        const existingTs = existing.id || 0;
                        if (incomingTs > existingTs) {
                            db.splice(conflictIdx, 1, inEntry);
                            replaced++;
                            updateFinTable(inEntry);
                        }
                        // else keep ours — it's newer, but still update finTable with any new assets
                        else { updateFinTable(existing); }
                    }
                });

                if (merged > 0 || replaced > 0) {
                    try { localStorage.setItem(APP_STORAGE_KEY, JSON.stringify(db)); } catch(e) {}
                    updateUI();
                    setSyncStatus('synced', Object.keys(p2pConnections).length);
                    const parts = [];
                    if (merged > 0)    parts.push(`${merged} new`);
                    if (replaced > 0)  parts.push(`${replaced} updated`);
                    showToast(`↓ Synced: ${parts.join(', ')} record${merged + replaced > 1 ? 's' : ''}`);
                }

                // Merge incoming finTable — union of assets, newer metadata wins
                if (msg.finTable && typeof msg.finTable === 'object') {
                    let finChanged = false;
                    Object.entries(msg.finTable).forEach(([fin, incoming]) => {
                        if (!finTable[fin]) {
                            finTable[fin] = { ...incoming };
                            finChanged = true;
                        } else {
                            // Merge assets
                            const existing = new Set(finTable[fin].assets || []);
                            (incoming.assets || []).forEach(a => {
                                if (!existing.has(a)) { finTable[fin].assets.push(a); existing.add(a); finChanged = true; }
                            });
                            // Keep newer metadata
                            if ((incoming._ts || 0) > (finTable[fin]._ts || 0)) {
                                finTable[fin].lastSeen   = incoming.lastSeen;
                                finTable[fin].lastFlight = incoming.lastFlight;
                                finTable[fin].type       = incoming.type || finTable[fin].type;
                                finTable[fin].body       = incoming.body || finTable[fin].body;
                                finTable[fin]._ts        = incoming._ts;
                                finChanged = true;
                            }
                        }
                    });
                    if (finChanged) saveFinTable();
                }

                // Send back anything they may be missing — use direct conn reference
                const replyConn = p2pConnections[fromPeer];
                if (replyConn && replyConn.open) {
                    replyConn.send({ type: 'FULL_SYNC', db, finTable });
                }
            }

            if (msg.type === 'NEW_ENTRY') {
                const inEntry = msg.entry;

                // Check for same FIN+Flight# conflict
                const conflictIdx = db.findIndex(r =>
                    r.FIN === inEntry.FIN &&
                    r['Flight#'] === inEntry['Flight#'] &&
                    r.FIN !== 'INV'
                );

                if (conflictIdx === -1) {
                    // No conflict — add if not already present
                    if (!db.find(r => r.id === inEntry.id)) {
                        db.unshift(inEntry);
                        updateFinTable(inEntry);
                        try { localStorage.setItem(APP_STORAGE_KEY, JSON.stringify(db)); } catch(e) {}
                        updateUI();
                        setSyncStatus('synced', Object.keys(p2pConnections).length);
                        showToast(`↓ New record synced from ${inEntry.Agent || 'peer'}`);
                    }
                } else {
                    // Conflict — keep newer timestamp
                    const existing = db[conflictIdx];
                    if ((inEntry.id || 0) > (existing.id || 0)) {
                        db.splice(conflictIdx, 1, inEntry);
                        updateFinTable(inEntry);
                        try { localStorage.setItem(APP_STORAGE_KEY, JSON.stringify(db)); } catch(e) {}
                        updateUI();
                        setSyncStatus('synced', Object.keys(p2pConnections).length);
                        showToast(`↓ Record updated from ${inEntry.Agent || 'peer'} (newer)`);
                    }
                    // else silently discard — ours is newer
                }
            }
        }

        // Called from handleSave — broadcast newly saved entry to all peers
        function broadcastNewEntry(entry) {
            const msg = { type: 'NEW_ENTRY', entry };
            const peers = Object.keys(p2pConnections);
            if (peers.length > 0) {
                peers.forEach(pid => conn_p2p_send(pid, msg));
                setSyncStatus('synced', peers.length);
            } else {
                // Queue for when a peer connects
                p2pOfflineQueue.push(msg);
                try { localStorage.setItem(P2P_QUEUE_KEY, JSON.stringify(p2pOfflineQueue)); } catch(e) {}
            }
        }

        function flushP2PQueue() {
            if (p2pOfflineQueue.length === 0) return;
            const peers = Object.keys(p2pConnections);
            if (peers.length === 0) return;
            p2pOfflineQueue.forEach(msg => peers.forEach(pid => conn_p2p_send(pid, msg)));
            p2pOfflineQueue = [];
            try { localStorage.setItem(P2P_QUEUE_KEY, JSON.stringify([])); } catch(e) {}
        }

        function startPeriodicSync(agentValue) {
            const P2P_SYNC_INTERVAL_MS = 1 * 60 * 1000; // 1 minute
            if (p2pSyncInterval) clearInterval(p2pSyncInterval);
            p2pSyncInterval = setInterval(() => {
                // Re-attempt any peers not currently connected
                connectToAllPeers(agentValue);
                // Send a full sync to all currently connected peers
                const peers = Object.keys(p2pConnections);
                if (peers.length > 0) {
                    peers.forEach(pid => conn_p2p_send(pid, { type: 'FULL_SYNC', db, finTable }));
                }
            }, P2P_SYNC_INTERVAL_MS);
        }

        function conn_p2p_send(peerId, msg) {
            const conn = p2pConnections[peerId];
            if (conn && conn.open) {
                conn.send(msg);
            }
        }

        // ─── Sync status indicator ────────────────────────────────────────────
        function setSyncStatus(state, peerCount = 0) {
            const dot   = document.getElementById('sync-dot');
            const label = document.getElementById('sync-label');
            if (!dot || !label) return;
            dot.className = 'w-2 h-2 rounded-full inline-block';
            if (state === 'online' || state === 'synced') {
                dot.classList.add('sync-dot-online');
                label.textContent = peerCount > 0 ? `${peerCount} peer${peerCount > 1 ? 's' : ''}` : 'Ready';
                label.style.color = '#34d399';
            } else if (state === 'connecting') {
                dot.classList.add('sync-dot-syncing');
                label.textContent = 'Connecting';
                label.style.color = '#93c5fd';
            } else {
                dot.classList.add('sync-dot-offline');
                label.textContent = 'P2P';
                label.style.color = '#475569';
            }
        }

        function updateSyncCount() {
            const count = Object.keys(p2pConnections).length;
            setSyncStatus(count > 0 ? 'online' : 'online', count);
        }

    </script>
